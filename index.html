<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --purp: #bb86fc; --cyan: #03dac6; --bg: #0b0b0e; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .tabs { 
            display: flex; background: rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 360px;
        }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            background: none; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--purp); color: white; box-shadow: 0 0 15px rgba(187,134,252,0.4); }

        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 20px; width: 100%; max-width: 360px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none;
        }
        .card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .price-tag { font-size: 48px; font-weight: 900; color: var(--cyan); text-align: center; margin: 15px 0; text-shadow: 0 0 20px rgba(3,218,198,0.3); }
        
        label { display: block; margin: 15px 0 5px 5px; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(0,0,0,0.4); color: white; font-size: 16px; box-sizing: border-box; outline: none; margin-bottom: 5px;
        }

        .switch-box {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin: 8px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .main-btn { 
            background: linear-gradient(135deg, #6200ee, #9d50bb); color: white; 
            border: none; padding: 18px; border-radius: 18px; width: 100%; 
            font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 15px;
        }

        .color-item { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .color-dot { width: 15px; height: 15px; border-radius: 50%; border: 1px solid #555; margin-right: 10px; }
        
        .history-item { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--purp); cursor: pointer;
        }
        .slider-range { width: 100%; margin: 10px 0; accent-color: var(--purp); }
        
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--cyan); cursor: pointer; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">💎 Чек</button>
        <button class="tab-btn" onclick="openTab('colors', this)">🎨 Кольори</button>
    </div>

    <div id="calc" class="card active">
        <div class="price-tag" id="res">0 ₴</div>
        
        <label>💳 Карта Monobank</label>
        <input type="text" id="mono_card" placeholder="0000 0000 0000 0000" oninput="saveMono()">

        <label>⚙️ Назва замовлення</label>
        <input type="text" id="p1_name" placeholder="Наприклад: Дракон">

        <label>🖨️ Принтер</label>
        <select id="printer" onchange="calc()">
            <option value="150">Bambu Lab A1 (150W)</option>
            <option value="80">Bambu Lab A1 Mini (80W)</option>
            <option value="350">Bambu Lab P1S/P (350W)</option>
        </select>

        <label>💰 Пластик (грн/кг)</label>
        <input type="number" id="p" value="800" oninput="calc()">

        <div class="switch-box">
            <span>📦 Пакування</span>
            <input type="checkbox" id="pack_check" onchange="calc()">
        </div>

        <div class="switch-box" style="border-color: var(--cyan);">
            <span style="color: var(--cyan);">🇺🇦 Донат на ЗСУ</span>
            <select id="zsu_amount" style="width: 80px; margin: 0; padding: 5px; font-size: 12px;" onchange="calc()">
                <option value="0">0 ₴</option>
                <option value="20">20 ₴</option>
                <option value="50">50 ₴</option>
                <option value="100">100 ₴</option>
            </select>
        </div>
        
        <label>⚖️ Вага (г)</label>
        <input type="number" id="w" placeholder="0" oninput="calc()">
        
        <label>⏱️ Час (год)</label>
        <input type="number" id="t" placeholder="0" oninput="calc()">
        
        <label>⚠️ Брак: <b id="bLabel" style="color:var(--cyan)">5%</b></label>
        <input type="range" id="b" min="0" max="20" value="5" class="slider-range" oninput="calc()">

        <label>📈 Націнка: <b id="mLabel" style="color:var(--purp)">100%</b></label>
        <input type="range" id="m" min="0" max="500" value="100" class="slider-range" oninput="calc()">
        
        <button class="main-btn" onclick="copyCheck()">📋 СКОПІЮВАТИ ТА ЗБЕРЕГТИ</button>

        <div id="history-container" style="margin-top: 25px;">
            <label>📜 Останні 5 розрахунків</label>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="colors" class="card">
        <h3 style="margin-top:0">🎨 Наявність кольорів</h3>
        <button class="main-btn" style="margin-bottom: 15px; background: var(--cyan); color: #000;" onclick="copySelectedColors()">📋 СКОПІЮВАТИ ОБРАНІ</button>
        
        <div id="color-list-container">
            </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const bambuColors = [
            { name: "Black (Basic)", hex: "#000000" },
            { name: "White (Basic)", hex: "#FFFFFF" },
            { name: "Red (Basic)", hex: "#EE2737" },
            { name: "Blue (Basic)", hex: "#005EB8" },
            { name: "Green (Basic)", hex: "#009639" },
            { name: "Orange (Basic)", hex: "#FF671F" },
            { name: "Yellow (Basic)", hex: "#FFCD00" },
            { name: "Gray (Matte)", hex: "#888B8D" },
            { name: "Ivory White (Matte)", hex: "#F2F0EB" },
            { name: "Silk Gold", hex: "#D4AF37" },
            { name: "Silk Silver", hex: "#C0C0C0" },
            { name: "Silk Bronze", hex: "#CD7F32" },
            { name: "Rainbow (Silk)", hex: "linear-gradient(45deg, red, blue, green)" }
        ];

        document.getElementById('mono_card').value = localStorage.getItem('dry_mono') || "";
        renderColors();
        renderHistory();

        function saveMono() { localStorage.setItem('dry_mono', document.getElementById('mono_card').value); }

        function renderColors() {
            let html = bambuColors.map((c, i) => `
                <div class="color-item">
                    <div style="display:flex; align-items:center;">
                        <div class="color-dot" style="background: ${c.hex}"></div>
                        <span>${c.name}</span>
                    </div>
                    <input type="checkbox" class="color-check" data-name="${c.name}">
                </div>
            `).join('');
            document.getElementById('color-list-container').innerHTML = html;
        }

        function copySelectedColors() {
            let selected = [];
            document.querySelectorAll('.color-check:checked').forEach(el => {
                selected.push("• " + el.getAttribute('data-name'));
            });
            
            if(selected.length === 0) return tg.showAlert("Вибери хоча б один колір!");
            
            let text = "🎨 Наявні кольори для замовлення:\n\n" + selected.join('\n');
            navigator.clipboard.writeText(text).then(() => tg.showAlert("Список обраних кольорів скопійовано!"));
        }

        function calc() {
            let pwr = document.getElementById('printer').value;
            let plastic = document.getElementById('p').value || 0;
            let w = document.getElementById('w').value || 0;
            let t = document.getElementById('t').value || 0;
            let markup = document.getElementById('m').value;
            let scrap = document.getElementById('b').value;
            let pack = document.getElementById('pack_check').checked ? 40 : 0;
            let zsu = parseInt(document.getElementById('zsu_amount').value);
            
            document.getElementById('mLabel').innerText = markup + "%";
            document.getElementById('bLabel').innerText = scrap + "%";
            
            let el = (pwr / 1000) * t * 4.32;
            let net = (w * (plastic / 1000)) + el + (t * 5); 
            let total = (net * (1 + scrap / 100) * (1 + markup / 100)) + pack + zsu;
            
            document.getElementById('res').innerText = Math.round(total) + " ₴";
        }

        function copyCheck() {
            let res = document.getElementById('res').innerText;
            let card = document.getElementById('mono_card').value;
            let zsu = parseInt(document.getElementById('zsu_amount').value);
            let name = document.getElementById('p1_name').value || "Деталь";
            let pack = document.getElementById('pack_check').checked ? "Так" : "Ні";
            
            if(!document.getElementById('w').value) return tg.showAlert("Введи вагу!");

            let msg = `🚀 Рахунок Dryguny:\n📦 Виріб: ${name}\n📦 Пакування: ${pack}${zsu > 0 ? '\n🇺🇦 Донат на ЗСУ: ' + zsu + ' ₴' : ''}\n💰 Сума: ${res}${card ? '\n💳 Карта: ' + card : ''}\n\n🛠 Дякуємо за замовлення!`;
            
            navigator.clipboard.writeText(msg).then(() => {
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Чек скопійовано!");
                saveHistory(name, res);
            });
        }

        function saveHistory(name, price) {
            let h = JSON.parse(localStorage.getItem('dry_v5') || '[]');
            h.unshift({
                name, price,
                w: document.getElementById('w').value,
                t: document.getElementById('t').value,
                p: document.getElementById('p').value,
                m: document.getElementById('m').value,
                b: document.getElementById('b').value,
                pr: document.getElementById('printer').value,
                pk: document.getElementById('pack_check').checked,
                zs: document.getElementById('zsu_amount').value,
                date: new Date().toLocaleTimeString()
            });
            if(h.length > 5) h.pop();
            localStorage.setItem('dry_v5', JSON.stringify(h));
            renderHistory();
        }

        function restore(i) {
            let h = JSON.parse(localStorage.getItem('dry_v5') || '[]');
            let d = h[i];
            if(!d) return;
            document.getElementById('p1_name').value = d.name;
            document.getElementById('w').value = d.w;
            document.getElementById('t').value = d.t;
            document.getElementById('p').value = d.p;
            document.getElementById('m').value = d.m;
            document.getElementById('b').value = d.b;
            document.getElementById('printer').value = d.pr;
            document.getElementById('pack_check').checked = d.pk;
            document.getElementById('zsu_amount').value = d.zs || 0;
            calc();
            tg.showAlert("Дані відновлено!");
        }

        function renderHistory() {
            let h = JSON.parse(localStorage.getItem('dry_v5') || '[]');
            document.getElementById('history-list').innerHTML = h.map((x, i) => `
                <div class="history-item" onclick="restore(${i})">
                    <span>${x.name} <small>(${x.date})</small></span>
                    <b>${x.price}</b>
                </div>
            `).join('');
        }

        function openTab(id, btn) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
