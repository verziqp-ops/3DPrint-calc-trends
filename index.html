<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Pro v39.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #ff5722; --bg: #fdfaf5; --card-bg: #ffffff; 
            --text: #2c2c2c; --gray: #9e9e9e; --input: #f7f3f0;
            --border: rgba(0,0,0,0.06); --banner-bg: #000000;
            --icon-color: #000000;
        }
        body.dark { 
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #f0f0f0; 
            --gray: #777; --input: #262626; --border: rgba(255,255,255,0.05);
            --icon-color: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; transition: 0.4s; padding-bottom: 80px; }
        
        /* СТИЛІ МАГАЗИНУ */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--input); }
        .product-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-title { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        .product-price { color: var(--accent); font-weight: 900; font-size: 16px; margin-bottom: 8px; }
        .buy-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; }
        
        /* СТИЛІ ТВОЄЇ АДМІНКИ */
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 10px; border-radius: 12px; cursor: pointer; color: var(--text); }
        .price-banner { background: var(--banner-bg); color: white; width: 100%; max-width: 440px; padding: 25px; border-radius: 28px; text-align: center; margin: 0 auto 25px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .price-tag { font-size: 52px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .banner-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1.5px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #222; }
        .stat-item { text-align: center; font-size: 13px; }
        .stat-item span { display: block; color: var(--gray); font-size: 9px; margin-bottom: 4px; text-transform: uppercase; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; width: 100%; max-width: 440px; box-sizing: border-box; margin: 0 auto 20px; border: 1px solid var(--border); }
        .section-title { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .section-title svg { width: 16px; height: 16px; fill: var(--accent); }
        .tabs { display: flex; overflow-x: auto; background: var(--input); border-radius: 16px; padding: 5px; margin: 0 auto 20px; width: 100%; max-width: 440px; gap: 4px; scrollbar-width: none; }
        .tab-btn { flex: 1; white-space: nowrap; padding: 10px 12px; border: none; border-radius: 12px; background: none; color: var(--gray); font-weight: bold; cursor: pointer; font-size: 10px; }
        .tab-btn.active { background: var(--accent); color: white; }
        label { display: block; margin: 15px 0 6px 4px; font-size: 10px; color: var(--gray); font-weight: 700; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 16px; border: none; background: var(--input); color: var(--text); font-size: 16px; outline: none; box-sizing: border-box; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > div { flex: 1; }
        .switch-box { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; background: var(--input); border-radius: 18px; margin-bottom: 10px; }
        .switch-box .label-area { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; }
        .switch-box svg { width: 20px; height: 20px; fill: var(--icon-color); }
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }
        .main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .sec-btn { background: var(--input); color: var(--text); border: none; padding: 14px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .round-btn { background: #333; color: #fff; border: none; padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; cursor: pointer; margin-top: 5px; }
        .cart-item, .catalog-item { background: var(--input); padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .hint { font-size: 9px; color: var(--gray); margin-top: 5px; line-height: 1.2; padding-left: 5px; }
        input[type=range] { width: 100%; accent-color: var(--accent); margin: 10px 0; }
    </style>
</head>
<body class="dark">

    <div class="header-box">
        <div style="font-weight: 900; font-size: 20px;">DRYGUNY <span style="color:var(--accent)">3D</span></div>
        <button class="theme-toggle" onclick="document.body.classList.toggle('dark')">🌓</button>
    </div>

    <div class="tabs" id="mode-nav">
        <button class="tab-btn active" onclick="showView('shop-view', this)">🛍 МАГАЗИН</button>
        <button class="tab-btn" onclick="showView('admin-view', this)">🔑 АДМІН (КАЛЬК)</button>
    </div>

    <div id="shop-view" style="display:block">
        <div class="shop-grid" id="public-shop-list"></div>
    </div>

    <div id="admin-view" style="display:none">
        <div class="price-banner">
            <div class="banner-label">Ціна для клієнта</div>
            <div id="res" class="price-tag">0 ₴</div>
            <button class="round-btn" onclick="roundPrice()">ОКРУГЛИТИ ДО 10</button>
            <div class="stats-grid">
                <div class="stat-item"><span>Собівартість</span><b id="total_cost">0</b> ₴</div>
                <div class="stat-item"><span>Прибуток</span><b id="profit_val">0</b> ₴</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('calc', this)">ГОЛОВНА</button>
            <button class="tab-btn" onclick="openTab('catalog', this)">📖 КАТАЛОГ</button>
            <button class="tab-btn" onclick="openTab('cart', this)">🛒 КОШИК (<span id="cart-count">0</span>)</button>
            <button class="tab-btn" onclick="openTab('storage', this)">📦 СКЛАД</button>
            <button class="tab-btn" onclick="openTab('history', this)">📜 ІСТОРІЯ</button>
        </div>

        <div id="calc" class="card tab-content" style="display:block">
            <div class="section-title">ПАРАМЕТРИ МОДЕЛІ</div>
            <input type="text" id="p_name" placeholder="Назва моделі">
            <div class="row">
                <div><label>Ціна пластику</label><input type="number" id="p_price" value="850" oninput="saveSettings()"></div>
                <div><label>Котушка (г)</label><input type="number" id="spool_w" value="1000" oninput="saveSettings()"></div>
            </div>
            <div class="row">
                <div><label>Вага (г)</label><input type="number" id="w" value="0" oninput="calc()"></div>
                <div><label>Брак (%)</label><input type="number" id="fail_percent" value="0" oninput="calc()"></div>
            </div>
            <div class="row">
                <div><label>Години</label><input type="number" id="t_h" value="0" oninput="calc()"></div>
                <div><label>Хвилини</label><input type="number" id="t_m" value="0" oninput="calc()"></div>
            </div>
            <div><label>Додаткові витрати</label><input type="number" id="extra_cost" value="0" oninput="calc()"></div>
            
            <div class="section-title" style="margin-top:15px">ПОСТ-ОБРОБКА</div>
            <div class="row">
                <div style="flex:2">
                    <select id="post_proc_select" onchange="syncPostProc()">
                        <option value="0">Без обробки (0₴)</option>
                        <option value="20">Легка (20₴)</option>
                        <option value="50">Середня (50₴)</option>
                        <option value="100">Складна (100₴)</option>
                        <option value="custom">Своя ціна...</option>
                    </select>
                </div>
                <div style="flex:1"><input type="number" id="post_proc" value="0" placeholder="₴" oninput="calc()"></div>
            </div>

            <div class="section-title" style="margin-top:15px">ОПЦІЇ ТА НАЦІНКА</div>
            <select id="discount_type" onchange="applyDiscountType()">
                <option value="100">Звичайна (100%)</option>
                <option value="50">Для друзів (50%)</option>
                <option value="30">Опт (30%)</option>
                <option value="custom">Своя націнка...</option>
            </select>
            <div id="custom_m_box" style="display:none; margin-top:10px;">
                <label>Націнка: <span id="mLabel">100%</span></label>
                <input type="range" id="m" min="0" max="500" value="100" oninput="calc()">
            </div>

            <div class="switch-box" style="margin-top:15px">
                <div class="label-area">ТЕРМІНОВО (+20%)</div>
                <label class="switch"><input type="checkbox" id="is_urgent" onchange="calc()"><span class="slider"></span></label>
            </div>
            <div class="switch-box">
                <div class="label-area">ПАКУВАННЯ</div>
                <label class="switch"><input type="checkbox" id="is_packing" onchange="calc()"><span class="slider"></span></label>
            </div>

            <div class="row" style="margin-top:15px">
                <button class="main-btn" onclick="addToCart()" style="flex:2">У КОШИК</button>
                <button class="main-btn" onclick="saveToCatalog()" style="background:#444; flex:1">💾</button>
            </div>
        </div>

        <div id="catalog" class="card tab-content" style="display:none">
            <div class="section-title">📖 КАТАЛОГ</div>
            <div id="catalog-list"></div>
            <div id="catalog-empty" style="text-align:center; color:var(--gray); padding:20px;">Порожньо</div>
        </div>

        <div id="cart" class="card tab-content" style="display:none">
            <div class="section-title">🛒 КОШИК</div>
            <div id="cart-list"></div>
            <div id="cart-empty" style="text-align:center; color:var(--gray); padding:20px;">Порожньо</div>
            <div id="cart-total-box" style="display:none; border-top:1px solid var(--border); margin-top:15px; padding-top:15px;">
                <button class="main-btn" onclick="copyCartCheck()">СПІЛЬНИЙ ЧЕК</button>
                <button class="sec-btn" onclick="clearCart()" style="color:#f44336">ОЧИСТИТИ ВСЕ</button>
            </div>
        </div>

        <div id="storage" class="card tab-content" style="display:none">
            <div class="section-title">⚙️ БАЗА</div>
            <div class="row">
                <div><label>Аморт</label><input type="number" id="val_amort" value="5" oninput="saveSettings()"></div>
                <div><label>Світло</label><input type="number" id="val_light" value="1" oninput="saveSettings()"></div>
            </div>
            <div class="row">
                <div><label>Робота</label><input type="number" id="val_work_hour" value="50" oninput="saveSettings()"></div>
                <div><label>Адгезія</label><input type="number" id="val_adhesion" value="3" oninput="saveSettings()"></div>
            </div>
            <div class="section-title" style="margin-top:20px">📦 ПАКУВАННЯ</div>
            <div class="row">
                <div><label>Партія</label><input type="number" id="box_party_price" value="500" oninput="saveSettings()"></div>
                <div><label>К-сть</label><input type="number" id="box_count" value="50" oninput="saveSettings()"></div>
            </div>
            <div><label>Наповнювач</label><input type="number" id="fill_price" value="5" oninput="saveSettings()"></div>
            <div class="hint">Собівартість 1 коробки: <span id="one_box_price">0</span> ₴</div>
        </div>

        <div id="history" class="card tab-content" style="display:none">
            <div class="section-title">📜 ІСТОРІЯ</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let history = JSON.parse(localStorage.getItem('dryguny_history') || '[]');
        let cart = JSON.parse(localStorage.getItem('dryguny_cart') || '[]');
        let catalog = JSON.parse(localStorage.getItem('dryguny_catalog') || '[]');
        let currentFinalPrice = 0;

        function showView(id, btn) {
            document.getElementById('shop-view').style.display = (id === 'shop-view') ? 'block' : 'none';
            document.getElementById('admin-view').style.display = (id === 'admin-view') ? 'block' : 'none';
            document.querySelectorAll('#mode-nav .tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'shop-view') renderPublicShop();
        }

        function renderPublicShop() {
            const list = document.getElementById('public-shop-list');
            list.innerHTML = catalog.map((item) => `
                <div class="product-card">
                    <img src="https://via.placeholder.com/150/ff5722/ffffff?text=${item.name}" class="product-img">
                    <div class="product-info">
                        <div class="product-title">${item.name}</div>
                        <div class="product-price">${item.calculated_price || 0} ₴</div>
                        <button class="buy-btn" onclick="alert('Для замовлення напишіть у чат назву: ${item.name}')">КУПИТИ</button>
                    </div>
                </div>`).join('');
        }

        function syncPostProc() {
            const select = document.getElementById('post_proc_select');
            if (select.value !== 'custom') document.getElementById('post_proc').value = select.value;
            calc();
        }

        function loadSettings() {
            const s = JSON.parse(localStorage.getItem('dryguny_settings') || '{}');
            ['p_price', 'spool_w', 'val_amort', 'val_light', 'box_party_price', 'box_count', 'fill_price', 'val_work_hour', 'val_adhesion'].forEach(f => {
                if(s[f] !== undefined) document.getElementById(f).value = s[f];
            });
            calc(); updateCartCounter(); renderCatalog(); renderPublicShop();
        }

        function saveSettings() {
            const s = {};
            ['p_price', 'spool_w', 'val_amort', 'val_light', 'box_party_price', 'box_count', 'fill_price', 'val_work_hour', 'val_adhesion'].forEach(f => {
                s[f] = document.getElementById(f).value;
            });
            localStorage.setItem('dryguny_settings', JSON.stringify(s));
            calc();
        }

        function applyDiscountType() {
            const type = document.getElementById('discount_type').value;
            if(type === 'custom') document.getElementById('custom_m_box').style.display = 'block';
            else {
                document.getElementById('custom_m_box').style.display = 'none';
                document.getElementById('m').value = type;
            }
            calc();
        }

        function roundPrice() {
            currentFinalPrice = Math.ceil(currentFinalPrice / 10) * 10;
            document.getElementById('res').innerText = currentFinalPrice + " ₴";
            tg.HapticFeedback.impactOccurred('light');
        }

        function calc() {
            let pPrice = parseFloat(document.getElementById('p_price').value) || 0;
            let spoolW = parseFloat(document.getElementById('spool_w').value) || 1000;
            let w = parseFloat(document.getElementById('w').value) || 0;
            let fail = parseFloat(document.getElementById('fail_percent').value) || 0;
            let h = parseFloat(document.getElementById('t_h').value) || 0;
            let min = parseFloat(document.getElementById('t_m').value) || 0;
            let extra = parseFloat(document.getElementById('extra_cost').value) || 0;
            let totalTime = h + (min/60);
            
            let bParty = parseFloat(document.getElementById('box_party_price').value) || 0;
            let bCount = parseFloat(document.getElementById('box_count').value) || 1;
            let fPrice = parseFloat(document.getElementById('fill_price').value) || 0;
            let oneBox = bParty / bCount;
            document.getElementById('one_box_price').innerText = oneBox.toFixed(1);
            
            let pack = document.getElementById('is_packing').checked ? (oneBox + fPrice) : 0;
            let m = parseFloat(document.getElementById('m').value);
            let urg = document.getElementById('is_urgent').checked ? 1.2 : 1;
            let post = parseFloat(document.getElementById('post_proc').value) || 0;

            let workHourRate = parseFloat(document.getElementById('val_work_hour').value) || 0;
            let adhesionCost = parseFloat(document.getElementById('val_adhesion').value) || 0;
            let amort = parseFloat(document.getElementById('val_amort').value) || 0;
            let light = parseFloat(document.getElementById('val_light').value) || 0;

            let plasticCost = (w * (1 + fail/100)) * (pPrice/spoolW);
            let techCost = totalTime * (amort + light);
            let cost = plasticCost + techCost + pack + post + extra + workHourRate + adhesionCost;
            let final = ((plasticCost + techCost) * (1 + m/100) * urg) + pack + post + extra + workHourRate + adhesionCost;

            currentFinalPrice = Math.round(final);
            document.getElementById('res').innerText = currentFinalPrice + " ₴";
            document.getElementById('total_cost').innerText = Math.round(cost);
            document.getElementById('profit_val').innerText = currentFinalPrice - Math.round(cost);
            document.getElementById('mLabel').innerText = m + "%";
            return { final: currentFinalPrice, cost };
        }

        function saveToCatalog() {
            let name = document.getElementById('p_name').value;
            if(!name) return alert("Введи назву!");
            let d = calc();
            let model = {
                name: name, w: document.getElementById('w').value, h: document.getElementById('t_h').value, 
                min: document.getElementById('t_m').value, m: document.getElementById('m').value, 
                post: document.getElementById('post_proc').value, urg: document.getElementById('is_urgent').checked, 
                pack: document.getElementById('is_packing').checked, fail: document.getElementById('fail_percent').value, 
                extra: document.getElementById('extra_cost').value, calculated_price: d.final
            };
            catalog = catalog.filter(i => i.name !== name);
            catalog.unshift(model);
            localStorage.setItem('dryguny_catalog', JSON.stringify(catalog));
            renderCatalog();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function openTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('#admin-view .tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
            if(id === 'cart') renderCart();
            if(id === 'history') renderHistory();
        }

        function renderCatalog() {
            const list = document.getElementById('catalog-list');
            document.getElementById('catalog-empty').style.display = catalog.length ? 'none' : 'block';
            list.innerHTML = catalog.map((item, i) => `
                <div class="catalog-item">
                    <div><b>${item.name}</b><br><small>${item.calculated_price}₴</small></div>
                    <button onclick="catalog.splice(${i},1); localStorage.setItem('dryguny_catalog', JSON.stringify(catalog)); renderCatalog();" style="border:none; background:none; color:red; font-size:20px;">×</button>
                </div>`).join('');
        }

        function addToCart() {
            let d = calc();
            cart.push({ name: document.getElementById('p_name').value || "Модель", price: d.final });
            localStorage.setItem('dryguny_cart', JSON.stringify(cart));
            updateCartCounter();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = "";
            document.getElementById('cart-empty').style.display = cart.length ? 'none' : 'block';
            document.getElementById('cart-total-box').style.display = cart.length ? 'block' : 'none';
            cart.forEach((item, i) => {
                let div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<div><b>${item.name}</b><br><small>${item.price}₴</small></div>
                    <button onclick="cart.splice(${i},1); localStorage.setItem('dryguny_cart', JSON.stringify(cart)); renderCart(); updateCartCounter();" style="border:none; background:none; color:red; font-size:20px;">×</button>`;
                list.appendChild(div);
            });
        }

        function copyCartCheck() {
            let txt = "📦Чек:\n"; let sum = 0;
            cart.forEach(i => { txt += `- ${i.name}: ${i.price}₴\n`; sum += i.price; });
            txt += `\n🔥 Разом: ${sum}₴`;
            navigator.clipboard.writeText(txt);
            alert("Скопійовано!");
        }

        function updateCartCounter() { document.getElementById('cart-count').innerText = cart.length; }
        function clearCart() { cart = []; localStorage.removeItem('dryguny_cart'); renderCart(); updateCartCounter(); }
        
        window.onload = loadSettings;
    </script>
</body>
</html>
