<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --purp: #bb86fc; --cyan: #03dac6; --bg: #0b0b0e; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .tabs { 
            display: flex; background: rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 360px;
        }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            background: none; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--purp); color: white; box-shadow: 0 0 15px rgba(187,134,252,0.4); }

        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 20px; width: 100%; max-width: 360px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none;
        }
        .card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .price-tag { font-size: 48px; font-weight: 900; color: var(--cyan); text-align: center; margin: 15px 0; text-shadow: 0 0 20px rgba(3,218,198,0.3); }
        
        label { display: block; margin: 15px 0 5px 5px; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input[type="number"], input[type="text"], select { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(0,0,0,0.4); color: white; font-size: 16px; box-sizing: border-box; outline: none;
            appearance: none;
        }
        input:focus, select:focus { border-color: var(--purp); }

        .profile-name-input { padding: 8px; font-size: 12px; margin-bottom: 5px; border-radius: 8px; border: 1px dashed #555; }

        .pack-switch {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin: 10px 0;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .pack-switch input { width: 20px; height: 20px; accent-color: var(--purp); }

        .slider { width: 100%; -webkit-appearance: none; height: 6px; background: #222; border-radius: 5px; margin: 15px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: var(--purp); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--purp); }

        .main-btn { 
            background: linear-gradient(135deg, #6200ee, #9d50bb); color: white; 
            border: none; padding: 18px; border-radius: 18px; width: 100%; 
            font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px;
        }

        .secondary-btn {
            background: rgba(255,255,255,0.05); color: white; border: 1px solid #444;
            padding: 10px; border-radius: 12px; width: 48%; font-size: 11px; cursor: pointer;
        }

        .flex-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">💎 Розрахунок</button>
        <button class="tab-btn" onclick="openTab('trends', this)">🔥 Тренди</button>
    </div>

    <div id="calc" class="card active">
        <div class="price-tag" id="res">0 ₴</div>
        
        <label>⚙️ Профіль 1</label>
        <input type="text" id="p1_name" class="profile-name-input" placeholder="Назва (напр. PLA Sunlu)">
        <div class="flex-row">
            <button class="secondary-btn" onclick="saveProfile(1)">Зберегти П1</button>
            <button class="secondary-btn" onclick="loadProfile(1)">Завантажити П1</button>
        </div>

        <label>⚙️ Профіль 2</label>
        <input type="text" id="p2_name" class="profile-name-input" placeholder="Назва (напр. PETG JamgHe)">
        <div class="flex-row">
            <button class="secondary-btn" onclick="saveProfile(2)">Зберегти П2</button>
            <button class="secondary-btn" onclick="loadProfile(2)">Завантажити П2</button>
        </div>

        <label>🖨️ Оберіть принтер</label>
        <select id="printer" onchange="calc()">
            <option value="150">Bambu Lab A1 (150W)</option>
            <option value="80">Bambu Lab A1 Mini (80W)</option>
            <option value="350">Bambu Lab P1S (350W)</option>
            <option value="350">Bambu Lab P1P (350W)</option>
        </select>

        <label>💰 Ціна пластику (грн/кг)</label>
        <input type="number" id="p" value="800" oninput="calc()">

        <label class="pack-switch">
            <span>📦 Крафт пакування (40₴)</span>
            <input type="checkbox" id="pack_check" onchange="calc()">
        </label>
        
        <label>⚖️ Вага деталі (грами)</label>
        <input type="number" id="w" placeholder="Введіть вагу..." oninput="calc()">
        
        <label>⏱️ Час друку (години)</label>
        <input type="number" id="t" placeholder="Години друку..." oninput="calc()">
        
        <label style="display:flex; justify-content:space-between">
            <span>📈 Націнка</span><b id="mLabel" style="color:var(--purp)">100%</b>
        </label>
        <input type="range" id="m" min="0" max="500" value="100" class="slider" oninput="calc()">
        
        <button class="main-btn" onclick="copyCheck()">📋 КОПІЮВАТИ ЧЕК</button>
    </div>

    <div id="trends" class="card">
        <h3 style="margin-top:0">Актуальне зараз</h3>
        <a href="https://makerworld.com/uk" class="trend-item" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white;">
            <div><b style="color: var(--purp);">MakerWorld Trends</b><span style="font-size: 12px; color: #777;">Топ 3MF моделей</span></div>
            <div style="font-size:24px">🐉</div>
        </a>
        <a href="https://www.tiktok.com/search?q=3d+printing+ideas" class="trend-item" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white;">
            <div><b style="color: var(--purp);">TikTok Viral</b><span style="font-size: 12px; color: #777;">Що зараз "залітає"</span></div>
            <div style="font-size:24px">📈</div>
        </a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        window.onload = function() {
            for(let i=1; i<=2; i++) {
                const saved = localStorage.getItem('dryguny_profile_' + i);
                if(saved) {
                    const data = JSON.parse(saved);
                    if(data.name) document.getElementById('p' + i + '_name').value = data.name;
                }
            }
        };

        function openTab(tabId, btn) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function calc() {
            let printerPower = document.getElementById('printer').value;
            let plastic = document.getElementById('p').value || 0;
            let weight = document.getElementById('w').value || 0;
            let time = document.getElementById('t').value || 0;
            let markup = document.getElementById('m').value;
            let packaging = document.getElementById('pack_check').checked ? 40 : 0;
            let tariff = 4.32; 
            
            document.getElementById('mLabel').innerText = markup + "%";
            
            let electricity = (printerPower / 1000) * time * tariff;
            let base = (weight * (plastic / 1000)) + electricity + (time * 5) + packaging; 
            let final = base * (1 + markup / 100);
            
            document.getElementById('res').innerText = Math.round(final) + " ₴";
        }

        function saveProfile(id) {
            const profile = {
                name: document.getElementById('p' + id + '_name').value,
                p: document.getElementById('p').value,
                m: document.getElementById('m').value,
                printer: document.getElementById('printer').value
            };
            localStorage.setItem('dryguny_profile_' + id, JSON.stringify(profile));
            tg.showAlert("Профіль " + (profile.name || id) + " збережено!");
        }

        function loadProfile(id) {
            const saved = localStorage.getItem('dryguny_profile_' + id);
            if (saved) {
                const profile = JSON.parse(saved);
                document.getElementById('p').value = profile.p;
                document.getElementById('m').value = profile.m;
                document.getElementById('printer').value = profile.printer;
                if(profile.name) document.getElementById('p' + id + '_name').value = profile.name;
                calc();
                tg.showAlert("Профіль завантажено!");
            } else {
                tg.showAlert("Профіль не знайдено.");
            }
        }

        function copyCheck() {
            let res = document.getElementById('res').innerText;
            let weight = document.getElementById('w').value;
            let isPacked = document.getElementById('pack_check').checked ? "Крафт (40₴)" : "Стандарт";
            let printerName = document.getElementById('printer').options[document.getElementById('printer').selectedIndex].text;
            if(!weight) return tg.showAlert("Введи вагу деталі!");
            
            let text = `🚀Чек:\n🖨 Принтер: ${printerName}\n⚖️ Вага: ${weight}г\n📦 Пакування: ${isPacked}\n💰 Разом до оплати: ${res}\n\nДякуємо за замовлення! 🛠`;
            navigator.clipboard.writeText(text);
            tg.showAlert("Чек скопійовано!");
        }
    </script>
</body>
</html>
