<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --purp: #bb86fc; --cyan: #03dac6; --bg: #0b0b0e; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .tabs { 
            display: flex; background: rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 360px;
        }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            background: none; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--purp); color: white; box-shadow: 0 0 15px rgba(187,134,252,0.4); }

        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 20px; width: 100%; max-width: 360px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none;
        }
        .card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .price-tag { font-size: 48px; font-weight: 900; color: var(--cyan); text-align: center; margin: 15px 0; text-shadow: 0 0 20px rgba(3,218,198,0.3); }
        
        label { display: block; margin: 15px 0 5px 5px; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input[type="number"], input[type="text"], select { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(0,0,0,0.4); color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }

        .profile-name-input { padding: 8px; font-size: 12px; margin-bottom: 5px; border-radius: 8px; border: 1px dashed #555; }

        .pack-switch-container {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider-round:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider-round { background-color: var(--purp); }
        input:checked + .slider-round:before { transform: translateX(24px); }

        .slider-range { width: 100%; -webkit-appearance: none; height: 6px; background: #222; border-radius: 5px; margin: 10px 0; }
        .slider-range::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--purp); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--purp); }

        .main-btn { 
            background: linear-gradient(135deg, #6200ee, #9d50bb); color: white; 
            border: none; padding: 18px; border-radius: 18px; width: 100%; 
            font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px;
        }
        .secondary-btn {
            background: rgba(255,255,255,0.05); color: white; border: 1px solid #444;
            padding: 10px; border-radius: 12px; width: 48%; font-size: 11px; cursor: pointer;
        }
        .flex-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }

        /* Стилі історії */
        .history-list { margin-top: 15px; }
        .history-item { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 3px solid var(--purp);
        }
        .history-item span { font-size: 14px; }
        .history-item b { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">💎 Розрахунок</button>
        <button class="tab-btn" onclick="openTab('trends', this)">🔥 Тренди</button>
    </div>

    <div id="calc" class="card active">
        <div class="price-tag" id="res">0 ₴</div>
        
        <label>⚙️ Профіль 1</label>
        <input type="text" id="p1_name" class="profile-name-input" placeholder="Назва">
        <div class="flex-row">
            <button class="secondary-btn" onclick="saveProfile(1)">Зберегти П1</button>
            <button class="secondary-btn" onclick="loadProfile(1)">Завантажити П1</button>
        </div>

        <label>🖨️ Принтер</label>
        <select id="printer" onchange="calc()">
            <option value="150">Bambu Lab A1 (150W)</option>
            <option value="80">Bambu Lab A1 Mini (80W)</option>
            <option value="350">Bambu Lab P1S/P (350W)</option>
        </select>

        <label>💰 Ціна пластику (грн/кг)</label>
        <input type="number" id="p" value="800" oninput="calc()">

        <div class="pack-switch-container">
            <span style="font-size: 14px; font-weight: bold;">📦 Крафт пакування (+40₴)</span>
            <label class="switch">
                <input type="checkbox" id="pack_check" onchange="calc()">
                <span class="slider-round"></span>
            </label>
        </div>
        
        <label>⚖️ Вага деталі (г)</label>
        <input type="number" id="w" placeholder="Вага..." oninput="calc()">
        
        <label>⏱️ Час друку (год)</label>
        <input type="number" id="t" placeholder="Час..." oninput="calc()">
        
        <label style="display:flex; justify-content:space-between">
            <span>⚠️ Брак</span><b id="bLabel" style="color:var(--cyan)">5%</b>
        </label>
        <input type="range" id="b" min="0" max="20" value="5" class="slider-range" oninput="calc()">

        <label style="display:flex; justify-content:space-between">
            <span>📈 Націнка</span><b id="mLabel" style="color:var(--purp)">100%</b>
        </label>
        <input type="range" id="m" min="0" max="500" value="100" class="slider-range" oninput="calc()">
        
        <button class="main-btn" onclick="copyCheck()">📋 КОПІЮВАТИ ТА ЗБЕРЕГТИ</button>

        <div id="history-container">
            <label>📜 Останні розрахунки</label>
            <div id="history-list" class="history-list"></div>
        </div>
    </div>

    <div id="trends" class="card">
        <h3 style="margin-top:0">Актуальне зараз</h3>
        <p>Розділ у розробці...</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Завантаження історії при старті
        renderHistory();

        function calc() {
            let printerPower = document.getElementById('printer').value;
            let plastic = document.getElementById('p').value || 0;
            let weight = document.getElementById('w').value || 0;
            let time = document.getElementById('t').value || 0;
            let markup = document.getElementById('m').value;
            let scrap = document.getElementById('b').value; // Брак
            let packPrice = document.getElementById('pack_check').checked ? 40 : 0;
            
            document.getElementById('mLabel').innerText = markup + "%";
            document.getElementById('bLabel').innerText = scrap + "%";
            
            let electricity = (printerPower / 1000) * time * 4.32;
            let netCost = (weight * (plastic / 1000)) + electricity + (time * 5); 
            
            // Додаємо брак до собівартості
            let costWithScrap = netCost * (1 + scrap / 100);
            
            let final = (costWithScrap * (1 + markup / 100)) + packPrice;
            
            document.getElementById('res').innerText = Math.round(final) + " ₴";
        }

        function saveProfile(id) {
            const profile = {
                name: document.getElementById('p1_name').value,
                p: document.getElementById('p').value,
                m: document.getElementById('m').value,
                printer: document.getElementById('printer').value
            };
            localStorage.setItem('dryguny_profile_' + id, JSON.stringify(profile));
            tg.showAlert("Профіль збережено!");
        }

        function loadProfile(id) {
            const saved = localStorage.getItem('dryguny_profile_' + id);
            if (saved) {
                const profile = JSON.parse(saved);
                document.getElementById('p').value = profile.p;
                document.getElementById('m').value = profile.m;
                document.getElementById('printer').value = profile.printer;
                document.getElementById('p1_name').value = profile.name || "";
                calc();
                tg.showAlert("Завантажено!");
            }
        }

        function openTab(tabId, btn) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function copyCheck() {
            let res = document.getElementById('res').innerText;
            let weight = document.getElementById('w').value;
            let isPacked = document.getElementById('pack_check').checked;
            let pName = document.getElementById('p1_name').value || "Без назви";
            
            if(!weight) return tg.showAlert("Введи вагу деталі!");
            
            let packText = isPacked ? "\n📦Тип пакування: крафт" : "";
            let text = `🚀Рахунок:${packText}\n💰Сума до сплати: ${res}\n\n🛠Дякуємо за ваше замовлення!`;
            
            navigator.clipboard.writeText(text).then(() => {
                tg.showAlert("Чек скопійовано! 🚀");
                addToHistory(pName, res);
            });
        }

        function addToHistory(name, price) {
            let history = JSON.parse(localStorage.getItem('dryguny_history') || '[]');
            history.unshift({ name, price, date: new Date().toLocaleTimeString() });
            if(history.length > 5) history.pop(); // Тільки останні 5
            localStorage.setItem('dryguny_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('dryguny_history') || '[]');
            let list = document.getElementById('history-list');
            list.innerHTML = history.map(item => `
                <div class="history-item">
                    <span>${item.name} <small>(${item.date})</small></span>
                    <b>${item.price}</b>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
