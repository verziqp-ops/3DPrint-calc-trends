<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Pro v35.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #ff5722; --bg: #fdfaf5; --card-bg: #ffffff; 
            --text: #2c2c2c; --gray: #9e9e9e; --input: #f7f3f0;
            --border: rgba(0,0,0,0.06); --banner-bg: #000000;
        }
        body.dark { 
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #f0f0f0; 
            --gray: #777; --input: #262626; --border: rgba(255,255,255,0.05);
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; transition: 0.4s; padding-bottom: 80px; }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 10px; border-radius: 12px; cursor: pointer; }

        .price-banner { 
            background: var(--banner-bg); color: white; width: 100%; max-width: 440px; 
            padding: 25px; border-radius: 28px; text-align: center; margin: 0 auto 25px; 
            position: sticky; top: 10px; z-index: 100; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .price-tag { font-size: 52px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .banner-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1.5px; }
        
        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            margin-top: 20px; padding-top: 15px; border-top: 1px solid #222;
        }
        .stat-item { text-align: center; font-size: 13px; }
        .stat-item span { display: block; color: var(--gray); font-size: 9px; margin-bottom: 4px; text-transform: uppercase; }

        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; width: 100%; max-width: 440px; box-sizing: border-box; margin: 0 auto 20px; border: 1px solid var(--border); }
        .section-title { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .tabs { display: flex; overflow-x: auto; background: var(--input); border-radius: 16px; padding: 5px; margin: 0 auto 20px; width: 100%; max-width: 440px; gap: 4px; }
        .tab-btn { flex: 1; white-space: nowrap; padding: 10px 12px; border: none; border-radius: 12px; background: none; color: var(--gray); font-weight: bold; cursor: pointer; font-size: 10px; }
        .tab-btn.active { background: var(--accent); color: white; }

        label { display: block; margin: 15px 0 6px 4px; font-size: 10px; color: var(--gray); font-weight: 700; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 16px; border: none; background: var(--input); color: var(--text); font-size: 16px; outline: none; box-sizing: border-box; }
        
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > div { flex: 1; }

        .switch-box { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; background: var(--input); border-radius: 18px; margin-bottom: 10px; }
        .switch-box span { font-size: 13px; font-weight: 600; }
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .sec-btn { background: var(--input); color: var(--text); border: none; padding: 14px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 8px; }

        .history-item, .cart-item { 
            background: var(--input); padding: 15px; border-radius: 18px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .paid-badge { font-size: 9px; padding: 4px 8px; border-radius: 8px; margin-left: 5px; }
        .paid { background: #4caf50; color: white; }
        .unpaid { background: #f44336; color: white; }

        input[type=range] { width: 100%; accent-color: var(--accent); margin: 10px 0; }
        .save-hint { font-size: 10px; color: var(--gray); text-align: center; margin-top: 10px; }
    </style>
</head>
<body class="dark">

    <div class="header-box">
        <div style="font-weight: 900; font-size: 20px;">DRYGUNY <span style="color:var(--accent)">3D</span></div>
        <button class="theme-toggle" onclick="document.body.classList.toggle('dark')">🌓</button>
    </div>

    <div class="price-banner">
        <div class="banner-label">Ціна для клієнта</div>
        <div id="res" class="price-tag">0 ₴</div>
        <div class="stats-grid">
            <div class="stat-item"><span>Собівартість</span><b id="total_cost">0</b> ₴</div>
            <div class="stat-item"><span>Прибуток</span><b style="color:var(--accent)" id="profit_val">0</b> ₴</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">ГОЛОВНА</button>
        <button class="tab-btn" onclick="openTab('cart', this)">🛒 КОШИК (<span id="cart-count">0</span>)</button>
        <button class="tab-btn" onclick="openTab('storage', this)">📦 СКЛАД</button>
        <button class="tab-btn" onclick="openTab('history', this)">📜 ІСТОРІЯ</button>
    </div>

    <div id="calc" class="card" style="display:block">
        <div class="section-title">🛠️ ПАРАМЕТРИ МОДЕЛІ</div>
        <input type="text" id="p_name" placeholder="Назва (напр. Дракон)">
        <textarea id="p_note" placeholder="Замітки (колір, клієнт...)" style="margin-top:10px; height:60px; font-size:13px;"></textarea>
        
        <div class="row">
            <div><label>Вага (г)</label><input type="number" id="w" value="0" oninput="calc()"></div>
            <div><label>К-сть (шт)</label><input type="number" id="qty" value="1" oninput="calc()"></div>
        </div>

        <div class="row">
            <div><label>Години</label><input type="number" id="t_h" value="0" oninput="calc()"></div>
            <div><label>Хвилини</label><input type="number" id="t_m" value="0" oninput="calc()"></div>
        </div>

        <div class="section-title" style="margin-top:15px">💰 ЗНИЖКИ ТА ТИП</div>
        <select id="discount_type" onchange="applyDiscountType()">
            <option value="100">Звичайна націнка (100%)</option>
            <option value="50">Для друзів (50%)</option>
            <option value="30">Опт (30%)</option>
            <option value="0">Без націнки (0%)</option>
            <option value="custom">Своя націнка...</option>
        </select>
        
        <div id="custom_m_box" style="display:none; margin-top:10px;">
            <label>Своя націнка: <span style="color:var(--accent)" id="mLabel">100%</span></label>
            <input type="range" id="m" min="0" max="500" value="100" oninput="calc()">
        </div>

        <div class="switch-box" style="margin-top:15px">
            <span>🚀 ТЕРМІНОВО (+20%)</span>
            <label class="switch"><input type="checkbox" id="is_urgent" onchange="calc()"><span class="slider"></span></label>
        </div>

        <div class="switch-box">
            <span>📦 ПАКУВАННЯ</span>
            <label class="switch"><input type="checkbox" id="is_packing" onchange="calc()"><span class="slider"></span></label>
        </div>

        <button class="main-btn" onclick="addToCart()">🛒 ДОДАТИ В КОШИК</button>
        <button class="sec-btn" onclick="saveAndCopy()">ШВИДКИЙ ЧЕК</button>
    </div>

    <div id="cart" class="card" style="display:none">
        <div class="section-title">🛒 ВАШЕ ЗАМОВЛЕННЯ</div>
        <div id="cart-list"></div>
        <div id="cart-empty" style="text-align:center; color:var(--gray); padding:20px;">Кошик порожній</div>
        <div id="cart-total-box" style="display:none; border-top:1px solid var(--border); margin-top:15px; padding-top:15px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>Разом:</span><b id="cart-total-val" style="font-size:20px; color:var(--accent)">0 ₴</b>
            </div>
            <button class="main-btn" onclick="copyCartCheck()">СКОПІЮВАТИ СПІЛЬНИЙ ЧЕК</button>
            <button class="sec-btn" onclick="clearCart()" style="color:#f44336">ОЧИСТИТИ ВСЕ</button>
        </div>
    </div>

    <div id="storage" class="card" style="display:none">
        <div class="section-title">📦 ПЛАСТИК ТА ПРИНТЕР</div>
        <div class="row">
            <div><label>Ціна (₴)</label><input type="number" id="p_price" value="850" oninput="saveSettings()"></div>
            <div><label>Вага (г)</label><input type="number" id="spool_w" value="1000" oninput="saveSettings()"></div>
        </div>
        <div class="row">
            <div><label>Аморт (₴/год)</label><input type="number" id="val_amort" value="5" oninput="saveSettings()"></div>
            <div><label>Світло (₴/год)</label><input type="number" id="val_light" value="1" oninput="saveSettings()"></div>
        </div>

        <div class="section-title" style="margin-top:20px">📦 ПАКУВАННЯ (ЗАКУПКА)</div>
        <div class="row">
            <div><label>Ціна партії (₴)</label><input type="number" id="box_bulk_price" value="500" oninput="saveSettings()"></div>
            <div><label>К-сть у партії</label><input type="number" id="box_bulk_qty" value="50" oninput="saveSettings()"></div>
        </div>
        <label>Стружка/наповнювач (₴ на бокс)</label>
        <input type="number" id="fill_price" value="5" oninput="saveSettings()">
        
        <div style="margin-top:15px; padding:15px; background:var(--input); border-radius:15px; font-size:12px;">
            <b>Собівартість 1 боксу:</b> <span id="pack_unit_price">0</span> ₴
        </div>
    </div>

    <div id="history" class="card" style="display:none">
        <div class="section-title">📜 ОСТАННІ ЧЕКИ</div>
        <div id="history-list"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let history = JSON.parse(localStorage.getItem('dryguny_history') || '[]');
        let cart = [];

        function loadSettings() {
            const s = JSON.parse(localStorage.getItem('dryguny_settings') || '{}');
            const fields = ['p_price', 'spool_w', 'val_amort', 'val_light', 'box_bulk_price', 'box_bulk_qty', 'fill_price'];
            fields.forEach(f => { if(s[f]) document.getElementById(f).value = s[f]; });
            calc();
        }

        function saveSettings() {
            const s = {};
            ['p_price', 'spool_w', 'val_amort', 'val_light', 'box_bulk_price', 'box_bulk_qty', 'fill_price'].forEach(f => {
                s[f] = document.getElementById(f).value;
            });
            localStorage.setItem('dryguny_settings', JSON.stringify(s));
            calc();
        }

        function applyDiscountType() {
            const type = document.getElementById('discount_type').value;
            const customBox = document.getElementById('custom_m_box');
            if(type === 'custom') {
                customBox.style.display = 'block';
            } else {
                customBox.style.display = 'none';
                document.getElementById('m').value = type;
            }
            calc();
        }

        function calc() {
            let w = parseFloat(document.getElementById('w').value) || 0;
            let qty = parseFloat(document.getElementById('qty').value) || 1;
            let h = parseFloat(document.getElementById('t_h').value) || 0;
            let min = parseFloat(document.getElementById('t_m').value) || 0;
            let m = parseFloat(document.getElementById('m').value);
            
            let pPrice = parseFloat(document.getElementById('p_price').value) || 850;
            let sW = parseFloat(document.getElementById('spool_w').value) || 1000;
            let vA = parseFloat(document.getElementById('val_amort').value) || 0;
            let vL = parseFloat(document.getElementById('val_light').value) || 0;

            // Розрахунок коробки
            let bBulkP = parseFloat(document.getElementById('box_bulk_price').value) || 0;
            let bBulkQ = parseFloat(document.getElementById('box_bulk_qty').value) || 1;
            let boxUnit = bBulkP / bBulkQ;
            let fillUnit = parseFloat(document.getElementById('fill_price').value) || 0;
            let onePack = boxUnit + fillUnit;
            document.getElementById('pack_unit_price').innerText = onePack.toFixed(1);

            let packingTotal = document.getElementById('is_packing').checked ? onePack : 0;
            let urgent = document.getElementById('is_urgent').checked ? 1.20 : 1;

            let totalH = h + (min / 60);
            let costPlast = w * (pPrice / sW);
            let costPrint = totalH * (vA + vL);
            
            let productionCost = (costPlast + costPrint + packingTotal) * qty;
            let finalPrice = productionCost * (1 + m / 100) * urgent;

            document.getElementById('res').innerText = Math.round(finalPrice) + " ₴";
            document.getElementById('total_cost').innerText = Math.round(productionCost);
            document.getElementById('profit_val').innerText = Math.round(finalPrice - productionCost);
            document.getElementById('mLabel').innerText = m + "%";
            return { finalPrice, productionCost, name: document.getElementById('p_name').value || "Модель" };
        }

        function addToCart() {
            let data = calc();
            cart.push({
                name: data.name,
                price: Math.round(data.finalPrice),
                qty: document.getElementById('qty').value,
                note: document.getElementById('p_note').value
            });
            document.getElementById('cart-count').innerText = cart.length;
            tg.HapticFeedback.impactOccurred('medium');
            openTab('cart', document.querySelectorAll('.tab-btn')[1]);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const empty = document.getElementById('cart-empty');
            const totalBox = document.getElementById('cart-total-box');
            list.innerHTML = "";
            let total = 0;
            
            if(cart.length === 0) {
                empty.style.display = 'block';
                totalBox.style.display = 'none';
                return;
            }

            empty.style.display = 'none';
            totalBox.style.display = 'block';

            cart.forEach((item, index) => {
                total += item.price;
                let div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<div><b>${item.name}</b><br><small>${item.qty} шт ${item.note ? '• ' + item.note : ''}</small></div>
                                 <div style="display:flex; align-items:center;"><b>${item.price} ₴</b>
                                 <button onclick="cart.splice(${index},1); renderCart();" style="background:none; border:none; color:red; margin-left:10px; font-size:18px;">×</button></div>`;
                list.appendChild(div);
            });
            document.getElementById('cart-total-val').innerText = total + " ₴";
            document.getElementById('cart-count').innerText = cart.length;
        }

        function copyCartCheck() {
            let total = 0;
            let text = "📦 Dryguny 3D — Кошик\n\n";
            cart.forEach(item => {
                text += `• ${item.name} (${item.qty} шт) — ${item.price} ₴\n`;
                if(item.note) text += `  💡 ${item.note}\n`;
                total += item.price;
            });
            text += `\n💰 РАЗОМ: ${total} ₴\n\nДякуємо за замовлення!`;
            navigator.clipboard.writeText(text);
            alert("Спільний чек скопійовано! ✅");
        }

        function clearCart() { cart = []; renderCart(); }

        function saveAndCopy() {
            let data = calc();
            let name = data.name;
            let price = Math.round(data.finalPrice);
            
            let entry = {
                id: Date.now(),
                name: name,
                price: price,
                paid: false,
                date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                vals: { q: document.getElementById('qty').value }
            };
            
            history.unshift(entry);
            if(history.length > 20) history.pop();
            localStorage.setItem('dryguny_history', JSON.stringify(history));
            
            let noteText = document.getElementById('p_note').value ? `\n💡 Замітка: ${document.getElementById('p_note').value}` : "";
            let checkText = `📦 Dryguny 3D\n🤖 Виріб: ${name}\n🔢 К-сть: ${entry.vals.q} шт${noteText}\n💰 Ціна: ${price} ₴\n\nДякуємо за замовлення!`;
            navigator.clipboard.writeText(checkText);
            alert("Чек скопійовано та збережено в історію! ✅");
        }

        function togglePaid(id) {
            let item = history.find(x => x.id === id);
            if(item) {
                item.paid = !item.paid;
                localStorage.setItem('dryguny_history', JSON.stringify(history));
                renderHistory();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = history.length ? '' : '<p style="text-align:center;color:var(--gray)">Історія порожня</p>';
            history.forEach(item => {
                let div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => togglePaid(item.id);
                div.innerHTML = `
                    <div class="history-info">
                        <b>${item.name} <span class="paid-badge ${item.paid ? 'paid' : 'unpaid'}">${item.paid ? 'ОПЛАЧЕНО' : 'НЕ ОПЛ.'}</span></b>
                        <span>${item.date} • ${item.vals.q} шт</span>
                    </div>
                    <b style="color:var(--accent)">${item.price} ₴</b>
                `;
                container.appendChild(div);
            });
        }

        function openTab(id, btn) {
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
            if(id === 'history') renderHistory();
            if(id === 'cart') renderCart();
        }

        window.onload = loadSettings;
    </script>
</body>
</html>
