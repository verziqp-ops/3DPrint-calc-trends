<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --purp: #bb86fc; --cyan: #03dac6; --bg: #0b0b0e; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .tabs { 
            display: flex; background: rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 360px;
        }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            background: none; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--purp); color: white; box-shadow: 0 0 15px rgba(187,134,252,0.4); }

        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 20px; width: 100%; max-width: 360px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none;
        }
        .card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .price-tag { font-size: 48px; font-weight: 900; color: var(--cyan); text-align: center; margin: 15px 0; text-shadow: 0 0 20px rgba(3,218,198,0.3); }
        
        label { display: block; margin: 15px 0 5px 5px; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(0,0,0,0.4); color: white; font-size: 16px; box-sizing: border-box; outline: none; margin-bottom: 5px;
        }

        .switch-box {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin: 8px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .main-btn { 
            background: linear-gradient(135deg, #6200ee, #9d50bb); color: white; 
            border: none; padding: 18px; border-radius: 18px; width: 100%; 
            font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 15px;
        }
        .secondary-btn {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid #444;
            padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; cursor: pointer;
        }

        .color-item { 
            background: rgba(255,255,255,0.02); padding: 12px; border-radius: 15px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .color-dot { width: 15px; height: 15px; border-radius: 50%; border: 1px solid #555; margin-right: 10px; }
        
        .history-item { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--purp); cursor: pointer;
        }
        .slider-range { width: 100%; margin: 10px 0; accent-color: var(--purp); }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--cyan); cursor: pointer; }

        .google-link { color: var(--cyan); text-decoration: none; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">💎 Чек</button>
        <button class="tab-btn" onclick="openTab('colors', this)">🎨 Кольори</button>
    </div>

    <div id="calc" class="card active">
        <div class="price-tag" id="res">0 ₴</div>
        
        <label>💳 Карта Monobank</label>
        <input type="text" id="mono_card" placeholder="0000 0000 0000 0000" oninput="saveMono()">

        <label>⚙️ Назва замовлення</label>
        <input type="text" id="p1_name" placeholder="Наприклад: Дракон">

        <label>🚚 Доставка</label>
        <select id="shipping">
            <option value="Нова Пошта">📦 Нова Пошта</option>
            <option value="Укрпошта">📦 Укрпошта</option>
            <option value="Самовивіз (Тернопіль)">🏙️ Самовивіз (Тернопіль)</option>
        </select>

        <label>🖨️ Принтер</label>
        <select id="printer" onchange="calc()">
            <option value="150">Bambu Lab A1 (150W)</option>
            <option value="80">Bambu Lab A1 Mini (80W)</option>
            <option value="350">Bambu Lab P1S/P (350W)</option>
        </select>

        <label>⚖️ Вага (г)</label>
        <input type="number" id="w" placeholder="0" oninput="calc()">
        
        <label>⏱️ Час (год)</label>
        <input type="number" id="t" placeholder="0" oninput="calc()">

        <div class="switch-box">
            <span>📦 Пакування (40 ₴)</span>
            <input type="checkbox" id="pack_check" onchange="calc()">
        </div>

        <div class="switch-box" style="border-color: var(--cyan);">
            <span style="color: var(--cyan);">🇺🇦 Донат на ЗСУ</span>
            <select id="zsu_amount" style="width: 80px; margin: 0; padding: 5px; font-size: 12px;" onchange="calc()">
                <option value="0">0 ₴</option>
                <option value="20">20 ₴</option>
                <option value="50">50 ₴</option>
                <option value="100">100 ₴</option>
            </select>
        </div>

        <button class="main-btn" onclick="copyCheck()">📋 СКОПІЮВАТИ ТА ЗБЕРЕГТИ</button>

        <div id="history-container" style="margin-top: 25px;">
            <label>📜 Останні розрахунки</label>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="colors" class="card">
        <h3 style="margin:0 0 15px 0">🎨 Кольори в наявності</h3>
        <button class="secondary-btn" onclick="copyStock()">📋 СКОПІЮВАТИ СПИСОК НАЯВНОСТІ</button>
        <div id="color-list-container"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const bambuColors = [
            { name: "Basic Purple", hex: "#6E3FA3" },
            { name: "Basic Gold", hex: "#E4BD64" },
            { name: "Basic Bronze", hex: "#84754E" },
            { name: "Basic Green", hex: "#00AE42" },
            { name: "Basic Yellow", hex: "#FCE300" },
            { name: "Basic Red", hex: "#C00D1E" },
            { name: "Black", hex: "#000000" },
            { name: "Basic Jade White", hex: "#FFFFFF" },
            { name: "Basic Magenta", hex: "#EC008C" },
            { name: "Basic Cyan", hex: "#0086D6" },
            { name: "Basic Silver", hex: "#A6A9AA" },
            { name: "Basic Blue", hex: "#00358E" },
            { name: "Silk Gold", hex: "#FFC600" },
            { name: "Silk Silver", hex: "#97999B" },
            { name: "Silk Copper", hex: "#5E4B3C" },
            { name: "Silk Blue", hex: "#147BD1" },
            { name: "CF Burgundy Red", hex: "#951E23" },
            { name: "CF Jeans Blue", hex: "#6E88BC" },
            { name: "CF Lava Gray", hex: "#4D5054" },
            { name: "CF Matcha Green", hex: "#5C9748" }
        ];

        document.getElementById('mono_card').value = localStorage.getItem('dry_mono') || "";
        renderColors();
        renderHistory();

        function saveMono() { localStorage.setItem('dry_mono', document.getElementById('mono_card').value); }
        function saveUrl(i, val) { localStorage.setItem('dry_url_v3_' + i, val); }

        function renderColors() {
            let html = bambuColors.map((c, i) => {
                let saved = localStorage.getItem('dry_url_v3_' + i) || "";
                let googleSearch = `https://www.google.com/search?q=color+hex+${c.hex.replace('#','')}`;
                return `
                <div class="color-item">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;">
                        <div style="display:flex; align-items:center;">
                            <div class="color-dot" style="background: ${c.hex}"></div>
                            <span style="font-size:13px">${c.name}</span>
                            <a href="${googleSearch}" target="_blank" class="google-link">🔍</a>
                        </div>
                        <input type="checkbox" class="color-check" data-name="${c.name}" data-hex="${c.hex}" data-index="${i}">
                    </div>
                    <input type="text" placeholder="Посилання на фото" value="${saved}" oninput="saveUrl(${i}, this.value)" style="font-size:11px; padding:8px; border-radius:8px;">
                </div>`;
            }).join('');
            document.getElementById('color-list-container').innerHTML = html;
        }

        function copyStock() {
            let selected = [];
            document.querySelectorAll('.color-check:checked').forEach(el => {
                let i = el.getAttribute('data-index');
                let name = el.getAttribute('data-name');
                let hex = el.getAttribute('data-hex');
                let url = localStorage.getItem('dry_url_v3_' + i);
                let google = `https://www.google.com/search?q=color+hex+${hex.replace('#','')}`;
                selected.push(`✅ ${name} (${hex})\n🔗 Фото: ${url || 'немає'}\n🔍 Google: ${google}`);
            });
            
            if(selected.length === 0) return tg.showAlert("Спершу вибери кольори галочками!");
            
            let msg = `🎨 КОЛЬОРИ В НАЯВНОСТІ Dryguny:\n\n${selected.join('\n\n')}`;
            navigator.clipboard.writeText(msg).then(() => {
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Список наявності скопійовано!");
            });
        }

        function calc() {
            let pwr = document.getElementById('printer').value;
            let w = document.getElementById('w').value || 0;
            let t = document.getElementById('t').value || 0;
            let pack = document.getElementById('pack_check').checked ? 40 : 0;
            let zsu = parseInt(document.getElementById('zsu_amount').value);
            
            let el = (pwr / 1000) * t * 4.32;
            let net = (w * 0.8) + el + (t * 5); // Спрощена формула (пластик 800 за кг)
            let total = (net * 1.05 * 2) + pack + zsu; // Брак 5%, націнка 100%
            document.getElementById('res').innerText = Math.round(total) + " ₴";
        }

        function copyCheck() {
            let res = document.getElementById('res').innerText;
            let card = document.getElementById('mono_card').value;
            let name = document.getElementById('p1_name').value || "Деталь";
            let ship = document.getElementById('shipping').value;
            let zsu = document.getElementById('zsu_amount').value;

            let sel = [];
            document.querySelectorAll('.color-check:checked').forEach(el => {
                let i = el.getAttribute('data-index');
                let url = localStorage.getItem('dry_url_v3_' + i);
                sel.push(`• ${el.getAttribute('data-name')} (${el.getAttribute('data-hex')})${url ? '\n  🔗 ' + url : ''}`);
            });
            let colText = sel.length > 0 ? `\n🎨 Колір:\n${sel.join('\n')}` : "";

            let msg = `🚀 Рахунок Dryguny:\n📦 Виріб: ${name}${colText}\n🚚 Доставка: ${ship}\n\n💰 Сума: ${res}${zsu > 0 ? '\n🇺🇦 Донат на ЗСУ: ' + zsu + ' ₴' : ''}${card ? '\n💳 Карта: ' + card : ''}\n\n🛠 Дякуємо за замовлення!`;
            
            navigator.clipboard.writeText(msg).then(() => {
                tg.showAlert("Чек скопійовано!");
                saveHistory(name, res);
            });
        }

        function saveHistory(name, price) {
            let h = JSON.parse(localStorage.getItem('dry_h_v3') || '[]');
            h.unshift({ name, price, date: new Date().toLocaleTimeString() });
            if(h.length > 5) h.pop();
            localStorage.setItem('dry_h_v3', JSON.stringify(h));
            renderHistory();
        }

        function renderHistory() {
            let h = JSON.parse(localStorage.getItem('dry_h_v3') || '[]');
            document.getElementById('history-list').innerHTML = h.map(x => `
                <div class="history-item">
                    <span>${x.name} <small>(${x.date})</small></span>
                    <b>${x.price}</b>
                </div>`).join('');
        }

        function openTab(id, btn) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
