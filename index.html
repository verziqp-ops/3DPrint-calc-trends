<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Hub Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --purp: #bb86fc; --cyan: #03dac6; --bg: #0b0b0e; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .tabs { 
            display: flex; background: rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 360px;
        }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            background: none; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--purp); color: white; box-shadow: 0 0 15px rgba(187,134,252,0.4); }

        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 20px; width: 100%; max-width: 400px; box-sizing: border-box; display: none;
        }
        .card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .price-tag { font-size: 48px; font-weight: 900; color: var(--cyan); text-align: center; margin: 15px 0; }
        
        label { display: block; margin: 12px 0 5px 5px; font-size: 11px; color: #aaa; text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(0,0,0,0.4); color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }

        /* СТИЛЬ ТУМБЛЕРА */
        .switch {
            position: relative; display: inline-block; width: 44px; height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--purp); }
        input:checked + .slider:before { transform: translateX(20px); }

        .row { display: flex; gap: 10px; margin-bottom: 5px; align-items: center; }
        .row > div { flex: 1; }

        .switch-box {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .main-btn { 
            background: linear-gradient(135deg, #6200ee, #9d50bb); color: white; 
            border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 15px;
        }

        .secondary-btn {
            background: rgba(255,255,255,0.05); color: var(--cyan); border: 1px solid var(--cyan);
            padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; cursor: pointer; font-weight: bold;
        }

        .color-item { 
            background: rgba(255,255,255,0.02); padding: 12px; border-radius: 15px; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .history-item { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--purp); cursor: pointer;
        }

        .slider-range { width: 100%; margin: 10px 0; accent-color: var(--purp); }
        .google-link { color: var(--cyan); text-decoration: none; font-size: 12px; margin-left: 8px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">💎 Розрахунок</button>
        <button class="tab-btn" onclick="openTab('colors', this)">🎨 Наявність</button>
    </div>

    <div id="calc" class="card active">
        <div class="price-tag" id="res">0 ₴</div>
        
        <label>⚙️ Модель</label>
        <input type="text" id="p1_name" placeholder="Назва моделі">

        <div class="row">
            <div>
                <label>⚖️ Вага (г)</label>
                <input type="number" id="w" placeholder="0" oninput="calc()">
            </div>
            <div>
                <label>⏱️ Час (год)</label>
                <input type="number" id="t" placeholder="0" oninput="calc()">
            </div>
        </div>

        <label>📈 Параметри прибутку</label>
        <div class="row">
            <div>
                <label>Націнка: <b id="mLabel">100%</b></label>
                <input type="range" id="m" min="0" max="500" value="100" class="slider-range" oninput="calc()">
            </div>
        </div>
        <div class="row">
            <div>
                <label>Брак: <b id="bLabel">5%</b></label>
                <input type="range" id="b" min="0" max="30" value="5" class="slider-range" oninput="calc()">
            </div>
        </div>

        <div class="switch-box">
            <span>📦 Пакування (40 ₴)</span>
            <label class="switch">
                <input type="checkbox" id="pack_check" onchange="calc()">
                <span class="slider"></span>
            </label>
        </div>

        <label>🚚 Деталі</label>
        <div class="row">
            <select id="printer" onchange="calc()">
                <option value="150">Bambu A1</option>
                <option value="80">A1 Mini</option>
                <option value="350">P1S/X1</option>
            </select>
            <select id="shipping">
                <option value="Нова Пошта">📦 НП</option>
                <option value="Укрпошта">📦 УП</option>
                <option value="Самовивіз">🏙️ Самовивіз</option>
            </select>
        </div>

        <label>💳 Карта</label>
        <input type="text" id="mono_card" placeholder="0000 0000 0000 0000" oninput="saveMono()">

        <button class="main-btn" onclick="copyCheck()">📋 КОПІЮВАТИ ТА ЗБЕРЕГТИ</button>

        <div id="history-list" style="margin-top:25px"></div>
    </div>

    <div id="colors" class="card">
        <button class="secondary-btn" onclick="copyStock()">📋 КОПІЮВАТИ СПИСОК НАЯВНОСТІ</button>
        <div id="color-list-container"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // СЮДИ ВСТАВЛЯЙ СВОЇ ПОСИЛАННЯ
        const drygunyColors = [
            { name: "Basic Purple", url: "https://посилання-на-фото" },
            { name: "Basic Gold", url: "https://посилання-на-фото" },
            { name: "Basic Bronze", url: "https://посилання-на-фото" },
            { name: "Basic Green", url: "https://посилання-на-фото" },
            { name: "Basic Yellow", url: "" },
            { name: "Basic Red", url: "" },
            { name: "Black", url: "" },
            { name: "Basic Jade White", url: "" },
            { name: "Basic Magenta", url: "" },
            { name: "Basic Cyan", url: "" },
            { name: "Basic Silver", url: "" },
            { name: "Basic Blue", url: "" },
            { name: "Silk Gold", url: "" },
            { name: "Silk Silver", url: "" },
            { name: "Silk Copper", url: "" },
            { name: "Silk Blue", url: "" },
            { name: "CF Burgundy Red", url: "" },
            { name: "CF Jeans Blue", url: "" },
            { name: "CF Lava Gray", url: "" },
            { name: "CF Matcha Green", url: "" }
        ];

        document.getElementById('mono_card').value = localStorage.getItem('dry_mono_v6') || "";
        renderColors();
        renderHistory();

        function saveMono() { localStorage.setItem('dry_mono_v6', document.getElementById('mono_card').value); }

        function renderColors() {
            let html = drygunyColors.map((c, i) => {
                let google = `https://www.google.com/search?q=Bambu+Lab+${c.name.replace(' ','+')}+color`;
                return `
                <div class="color-item">
                    <div style="display:flex; align-items:center; justify-content:space-between;">
                        <div style="display:flex; align-items:center;">
                            <span style="font-size:14px; font-weight:bold;">${c.name}</span>
                            <a href="${google}" target="_blank" class="google-link">🔍</a>
                        </div>
                        <label class="switch">
                            <input type="checkbox" class="color-check" data-name="${c.name}" data-url="${c.url}">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div style="font-size:10px; color:#666; margin-top:5px; word-break:break-all;">${c.url || 'Фото не додано'}</div>
                </div>`;
            }).join('');
            document.getElementById('color-list-container').innerHTML = html;
        }

        function calc() {
            let pwr = document.getElementById('printer').value;
            let w = document.getElementById('w').value || 0;
            let t = document.getElementById('t').value || 0;
            let m = document.getElementById('m').value;
            let b = document.getElementById('b').value;
            let pack = document.getElementById('pack_check').checked ? 40 : 0;
            
            document.getElementById('mLabel').innerText = m + "%";
            document.getElementById('bLabel').innerText = b + "%";
            
            let cost = (w * 0.85) + ((pwr/1000) * t * 4.5) + (t * 4); // Собівартість
            let total = (cost * (1 + b/100) * (1 + m/100)) + pack;
            document.getElementById('res').innerText = Math.round(total) + " ₴";
        }

        function copyStock() {
            let sel = [];
            document.querySelectorAll('.color-check:checked').forEach(el => {
                sel.push(`✅ ${el.getAttribute('data-name')}\n🔗 Фото: ${el.getAttribute('data-url') || 'за запитом'}`);
            });
            if(sel.length === 0) return tg.showAlert("Вибери кольори!");
            navigator.clipboard.writeText(`🎨 Dryguny — Доступні кольори:\n\n${sel.join('\n\n')}`)
                .then(() => tg.showAlert("Список наявності скопійовано!"));
        }

        function copyCheck() {
            let res = document.getElementById('res').innerText;
            let name = document.getElementById('p1_name').value || "Модель";
            let ship = document.getElementById('shipping').value;
            let card = document.getElementById('mono_card').value;

            let col = [];
            document.querySelectorAll('.color-check:checked').forEach(el => {
                col.push(`• ${el.getAttribute('data-name')}`);
            });

            let msg = `🚀 Рахунок Dryguny:\n📦 Виріб: ${name}\n🎨 Колір: ${col.join(', ') || 'уточнюється'}\n🚚 Доставка: ${ship}\n\n💰 Сума: ${res}\n💳 Карта: ${card}\n\n🛠 Дякуємо за замовлення!`;
            navigator.clipboard.writeText(msg).then(() => {
                tg.showAlert("Чек скопійовано!");
                saveHistory(name, res);
            });
        }

        function saveHistory(name, price) {
            let h = JSON.parse(localStorage.getItem('dry_h_v6') || '[]');
            h.unshift({ name, price, date: new Date().toLocaleTimeString() });
            if(h.length > 5) h.pop();
            localStorage.setItem('dry_h_v6', JSON.stringify(h));
            renderHistory();
        }

        function renderHistory() {
            let h = JSON.parse(localStorage.getItem('dry_h_v6') || '[]');
            document.getElementById('history-list').innerHTML = `<label>📜 Останні чеки</label>` + h.map(x => `
                <div class="history-item">
                    <span>${x.name}</span>
                    <b>${x.price}</b>
                </div>`).join('');
        }

        function openTab(id, btn) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
