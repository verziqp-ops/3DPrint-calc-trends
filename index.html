<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny 3D Calc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 15px; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 18px; margin-bottom: 20px; border: 1px solid #3d3d3d; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #bb86fc; margin-bottom: 20px; }
        h3 { color: #03dac6; font-size: 1.1em; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #2c2c2c; color: white; font-size: 16px; }
        button { background: #6200ee; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:active { transform: scale(0.98); background: #3700b3; }
        .send-btn { background: #03dac6; color: #000; margin-top: 15px; }
        
        .trend-container { text-align: left; }
        .trend-item { display: flex; align-items: center; background: #2a2a2a; margin: 8px 0; padding: 12px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; }
        .trend-item:hover { border-color: #bb86fc; background: #333; }
        .trend-icon { font-size: 24px; margin-right: 15px; }
        .trend-info b { display: block; color: #bb86fc; }
        .trend-info span { font-size: 0.85em; color: #999; }
    </style>
</head>
<body>
    <h2>🛠 Dryguny 3D Calc</h2>
    
    <div class="card">
        <h3>Калькулятор прибутку</h3>
        <input type="number" id="weight" placeholder="Вага деталі (г)">
        <input type="number" id="cost" placeholder="Ціна пластику (грн/кг)" value="800">
        <input type="number" id="markup" placeholder="Націнка (%)" value="100">
        <h2 id="result">0 грн</h2>
        <button onclick="calculate()">Порахувати</button>
        <button class="send-btn" onclick="sendToClient()">📋 Копіювати чек для клієнта</button>
    </div>

    <div class="card">
        <h3>🔥 Тренди та Сайти</h3>
        <div class="trend-container">
            <div class="trend-item" onclick="window.open('https://www.tiktok.com/search?q=3d+printing+ideas', '_blank')">
                <div class="trend-icon">📱</div>
                <div class="trend-info"><b>Тренди TikTok</b><span>Що зараз "залітає" в рек</span></div>
            </div>
            <div class="trend-item" onclick="window.open('https://makerworld.com/en/trending', '_blank')">
                <div class="trend-icon">🏗️</div>
                <div class="trend-info"><b>MakerWorld Trending</b><span>Найпопулярніші моделі</span></div>
            </div>
            <div class="trend-item" onclick="window.open('https://www.printables.com/model', '_blank')">
                <div class="trend-icon">📦</div>
                <div class="trend-info"><b>Printables</b><span>База крутих STL файлів</span></div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function calculate() {
            let w = document.getElementById('weight').value;
            let c = document.getElementById('cost').value;
            let m = document.getElementById('markup').value;
            if(!w) return alert("Введи вагу!");
            
            let res = (w * (c / 1000)) * (1 + m / 100);
            document.getElementById('result').innerText = Math.round(res) + " грн";
        }

        function sendToClient() {
            let weight = document.getElementById('weight').value;
            let finalPrice = document.getElementById('result').innerText;
            if(finalPrice === "0 грн") return alert("Спочатку порахуй!");

            let text = `📦 Ваше замовлення Dryguny:\n⚖️ Вага: ${weight}г\n💰 Ціна: ${finalPrice}\nДякуємо, що обираєте нас! 🚀`;
            
            // Копіювання в буфер обміну
            navigator.clipboard.writeText(text).then(() => {
                alert("Чек скопійовано! Тепер просто встав його в чат з клієнтом.");
            });
        }
    </script>
</body>
</html>
