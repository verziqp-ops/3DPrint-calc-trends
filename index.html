<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Pro v40.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* УСІ ТВОЇ СТИЛІ ЗАЛИШИЛИСЬ БЕЗ ЗМІН */
        :root { 
            --accent: #ff5722; --bg: #fdfaf5; --card-bg: #ffffff; 
            --text: #2c2c2c; --gray: #9e9e9e; --input: #f7f3f0;
            --border: rgba(0,0,0,0.06); --banner-bg: #000000;
            --icon-color: #000000;
        }
        body.dark { 
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #f0f0f0; 
            --gray: #777; --input: #262626; --border: rgba(255,255,255,0.05);
            --icon-color: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; transition: 0.4s; padding-bottom: 80px; }
        
        .shop-categories { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .shop-categories::-webkit-scrollbar { display: none; }
        .cat-chip { background: var(--input); color: var(--gray); padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); }
        .cat-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; min-height: 280px; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--input); }
        .product-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
        .product-desc { font-size: 10px; color: var(--gray); margin-bottom: 8px; flex-grow: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { color: var(--accent); font-weight: 900; font-size: 16px; display: block; margin-bottom: 10px; }
        .buy-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; font-size: 12px; }

        #floating-cart { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 15px 20px; border-radius: 30px; font-weight: 900; box-shadow: 0 10px 20px rgba(255,87,34,0.3); z-index: 999; cursor: pointer; display: none; align-items: center; gap: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 24px; max-width: 400px; margin: 40px auto; }

        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 10px; border-radius: 12px; cursor: pointer; color: var(--text); }
        .price-banner { background: var(--banner-bg); color: white; width: 100%; max-width: 440px; padding: 25px; border-radius: 28px; text-align: center; margin: 0 auto 25px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .price-tag { font-size: 52px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .banner-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1.5px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #222; }
        .stat-item { text-align: center; font-size: 13px; }
        .stat-item span { display: block; color: var(--gray); font-size: 9px; margin-bottom: 4px; text-transform: uppercase; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; width: 100%; max-width: 440px; box-sizing: border-box; margin: 0 auto 20px; border: 1px solid var(--border); }
        .section-title { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .tabs { display: flex; overflow-x: auto; background: var(--input); border-radius: 16px; padding: 5px; margin: 0 auto 20px; width: 100%; max-width: 440px; gap: 4px; scrollbar-width: none; }
        .tab-btn { flex: 1; white-space: nowrap; padding: 10px 12px; border: none; border-radius: 12px; background: none; color: var(--gray); font-weight: bold; cursor: pointer; font-size: 10px; }
        .tab-btn.active { background: var(--accent); color: white; }
        label { display: block; margin: 15px 0 6px 4px; font-size: 10px; color: var(--gray); font-weight: 700; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 16px; border: none; background: var(--input); color: var(--text); font-size: 16px; outline: none; box-sizing: border-box; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > div { flex: 1; }
        .main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .sec-btn { background: var(--input); color: var(--text); border: none; padding: 14px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .round-btn { background: #333; color: #fff; border: none; padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; cursor: pointer; margin-top: 5px; }
        .catalog-item { background: var(--input); padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        input[type=range] { width: 100%; accent-color: var(--accent); margin: 10px 0; }
    </style>
</head>
<body class="dark">

    <div class="header-box">
        <div style="font-weight: 900; font-size: 20px;">DRYGUNY <span style="color:var(--accent)">3D</span></div>
        <button class="theme-toggle" onclick="document.body.classList.toggle('dark')">🌓</button>
    </div>

    <div class="tabs" id="mode-nav">
        <button class="tab-btn active" onclick="showView('shop-view', this)">🛍 МАГАЗИН</button>
        <button class="tab-btn" onclick="showView('admin-view', this)">🔑 АДМІН (КАЛЬК)</button>
    </div>

    <div id="shop-view" style="display:block">
        <div class="shop-categories" id="cat-tabs">
            <div class="cat-chip active" onclick="filterShop('Всі', this)">Всі</div>
            <div class="cat-chip" onclick="filterShop('Дім', this)">🏠 Дім</div>
            <div class="cat-chip" onclick="filterShop('Брелоки', this)">🔑 Брелоки</div>
            <div class="cat-chip" onclick="filterShop('Інше', this)">📦 Інше</div>
        </div>
        <div class="shop-grid" id="public-shop-list">
            <div style="grid-column: 1/-1; text-align: center; padding: 20px;">Завантаження товарів...</div>
        </div>
    </div>

    <div id="floating-cart" onclick="openOrderModal()">
        <span>🛒</span>
        <span id="client-cart-count">0</span>
        <span>ОФОРМИТИ</span>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div class="section-title">📦 ОФОРМЛЕННЯ ЗАМОВЛЕННЯ</div>
            <div id="order-summary" style="font-size:12px; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;"></div>
            <input type="text" id="cust_fio" placeholder="Прізвище Ім'я">
            <input type="tel" id="cust_phone" placeholder="+380...">
            <button class="main-btn" onclick="sendOrder()">КУПИТИ</button>
            <button class="sec-btn" onclick="closeOrderModal()">СКАСУВАТИ</button>
        </div>
    </div>

    <div id="admin-view" style="display:none">
        <div class="price-banner">
            <div class="banner-label">Ціна для клієнта</div>
            <div id="res" class="price-tag">0 ₴</div>
            <button class="round-btn" onclick="roundPrice()">ОКРУГЛИТИ ДО 10</button>
            <div class="stats-grid">
                <div class="stat-item"><span>Собівартість</span><b id="total_cost">0</b> ₴</div>
                <div class="stat-item"><span>Прибуток</span><b id="profit_val">0</b> ₴</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('calc', this)">ГОЛОВНА</button>
            <button class="tab-btn" onclick="openTab('catalog', this)">📖 КАТАЛОГ</button>
            <button class="tab-btn" onclick="openTab('storage', this)">📦 СКЛАД</button>
        </div>

        <div id="calc" class="card tab-content" style="display:block">
            <div class="section-title">ПАРАМЕТРИ ТОВАРУ</div>
            <input type="text" id="p_name" placeholder="Назва моделі">
            <input type="text" id="p_desc" placeholder="Опис">
            <div class="row">
                <div><label>Категорія</label><select id="p_cat"><option value="Дім">🏠 Дім</option><option value="Брелоки">🔑 Брелоки</option><option value="Інше">📦 Інше</option></select></div>
                <div><label>Опт ціна</label><input type="number" id="p_opt_price" placeholder="₴"></div>
            </div>
            <div class="row">
                <div><label>Ціна пластику</label><input type="number" id="p_price" value="850" oninput="saveSettings()"></div>
                <div><label>Котушка (г)</label><input type="number" id="spool_w" value="1000" oninput="saveSettings()"></div>
            </div>
            <div class="row">
                <div><label>Вага (г)</label><input type="number" id="w" value="0" oninput="calc()"></div>
                <div><label>Брак (%)</label><input type="number" id="fail_percent" value="0" oninput="calc()"></div>
            </div>
            <div class="row">
                <div><label>Години</label><input type="number" id="t_h" value="0" oninput="calc()"></div>
                <div><label>Хвилини</label><input type="number" id="t_m" value="0" oninput="calc()"></div>
            </div>
            <select id="discount_type" onchange="applyDiscountType()" style="margin-top:15px">
                <option value="100">Звичайна (100%)</option>
                <option value="50">Для друзів (50%)</option>
                <option value="custom">Своя націнка...</option>
            </select>
            <div id="custom_m_box" style="display:none; margin-top:10px;"><input type="range" id="m" min="0" max="500" value="100" oninput="calc()"></div>
            <button class="main-btn" onclick="saveToCatalog()">💾 ЗБЕРЕГТИ В МАГАЗИН</button>
        </div>

        <div id="catalog" class="card tab-content" style="display:none">
            <div id="catalog-list"></div>
        </div>

        <div id="storage" class="card tab-content" style="display:none">
            <label>Амортизація</label><input type="number" id="val_amort" value="5" oninput="saveSettings()">
            <label>Світло</label><input type="number" id="val_light" value="1" oninput="saveSettings()">
            <label>Робота/год</label><input type="number" id="val_work_hour" value="50" oninput="saveSettings()">
            <label>Адгезія</label><input type="number" id="val_adhesion" value="3" oninput="saveSettings()">
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // --- ВАЖЛИВО: ЗАМІНИ НА СВОЄ ПОСИЛАННЯ ВІД RENDER ---
        const API_URL = "https://dryguny-bot.onrender.com"; 

        let catalog = []; // Тепер завантажуємо з бота
        let clientCart = []; 

        // 1. ЗАВАНТАЖЕННЯ ТОВАРІВ З БОТА
        async function loadProductsFromBot() {
            try {
                const response = await fetch(`${API_URL}/get_products`);
                if (response.ok) {
                    catalog = await response.json();
                    renderPublicShop();
                    renderCatalog();
                }
            } catch (e) {
                console.error("Не вдалося завантажити товари:", e);
                // Якщо сервер лежить, беремо з пам'яті браузера як запасний варіант
                catalog = JSON.parse(localStorage.getItem('dryguny_catalog') || '[]');
                renderPublicShop();
            }
        }

        function showView(id, btn) {
            document.getElementById('shop-view').style.display = (id === 'shop-view') ? 'block' : 'none';
            document.getElementById('admin-view').style.display = (id === 'admin-view') ? 'block' : 'none';
            document.querySelectorAll('#mode-nav .tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateClientCartUI();
        }

        function renderPublicShop(filter = 'Всі') {
            const list = document.getElementById('public-shop-list');
            const filtered = filter === 'Всі' ? catalog : catalog.filter(i => i.category === filter);
            
            if (filtered.length === 0) {
                list.innerHTML = `<div style="grid-column:1/-1; color:gray; text-align:center">Тут поки порожньо...</div>`;
                return;
            }

            list.innerHTML = filtered.map((item) => `
                <div class="product-card">
                    <img src="${item.img && item.img.startsWith('http') ? item.img : 'https://placehold.jp/24/ff5722/ffffff/200x200.png?text=3D'}" class="product-img">
                    <div class="product-info">
                        <div class="product-title">${item.name}</div>
                        <div class="product-desc">${item.desc || ''}</div>
                        <span class="product-price">${item.price || item.calculated_price} ₴</span>
                        <button class="buy-btn" onclick="addClientCart('${item.name}', ${item.price || item.calculated_price})">В КОШИК</button>
                    </div>
                </div>`).join('');
        }

        function addClientCart(name, price) {
            clientCart.push({name, price});
            tg.HapticFeedback.impactOccurred('medium');
            updateClientCartUI();
        }

        function updateClientCartUI() {
            const btn = document.getElementById('floating-cart');
            const count = document.getElementById('client-cart-count');
            if (clientCart.length > 0 && document.getElementById('shop-view').style.display === 'block') {
                btn.style.display = 'flex';
                count.innerText = clientCart.length;
            } else {
                btn.style.display = 'none';
            }
        }

        function openOrderModal() {
            const summary = document.getElementById('order-summary');
            let total = clientCart.reduce((sum, i) => sum + i.price, 0);
            let listHtml = clientCart.map(i => `• ${i.name} (${i.price}₴)`).join('<br>');
            summary.innerHTML = `${listHtml}<br><br><b>РАЗОМ: ${total}₴</b>`;
            document.getElementById('order-modal').style.display = 'block';
        }

        function closeOrderModal() { document.getElementById('order-modal').style.display = 'none'; }

        function sendOrder() {
            const fio = document.getElementById('cust_fio').value;
            const phone = document.getElementById('cust_phone').value;
            if(!fio || !phone) return alert("Вкажіть дані!");

            let orderData = {
                type: "new_order",
                fio: fio,
                phone: phone,
                items: clientCart.map(i => i.name).join(", "),
                total: clientCart.reduce((sum, i) => sum + i.price, 0)
            };

            tg.sendData(JSON.stringify(orderData));
            clientCart = [];
            updateClientCartUI();
            closeOrderModal();
        }

        // --- ТВОЯ ЛОГІКА КАЛЬКУЛЯТОРА ---
        function calc() {
            let pPrice = parseFloat(document.getElementById('p_price').value) || 0;
            let spoolW = parseFloat(document.getElementById('spool_w').value) || 1000;
            let w = parseFloat(document.getElementById('w').value) || 0;
            let fail = parseFloat(document.getElementById('fail_percent').value) || 0;
            let h = parseFloat(document.getElementById('t_h').value) || 0;
            let min = parseFloat(document.getElementById('t_m').value) || 0;
            let m = parseFloat(document.getElementById('m').value) || 100;

            let plasticCost = (w * (1 + fail/100)) * (pPrice/spoolW);
            let techCost = (h + min/60) * (parseFloat(document.getElementById('val_amort').value) + parseFloat(document.getElementById('val_light').value));
            let totalCost = plasticCost + techCost + parseFloat(document.getElementById('val_work_hour').value) + parseFloat(document.getElementById('val_adhesion').value);
            let final = ((plasticCost + techCost) * (1 + m/100)) + parseFloat(document.getElementById('val_work_hour').value) + parseFloat(document.getElementById('val_adhesion').value);

            document.getElementById('res').innerText = Math.round(final) + " ₴";
            document.getElementById('total_cost').innerText = Math.round(totalCost);
            document.getElementById('profit_val').innerText = Math.round(final - totalCost);
            return Math.round(final);
        }

        function saveToCatalog() {
            let name = document.getElementById('p_name').value;
            if(!name) return alert("Введи назву!");
            let price = calc();
            let model = {
                name: name,
                desc: document.getElementById('p_desc').value,
                category: document.getElementById('p_cat').value,
                price: price
            };
            // Поки що зберігаємо локально, щоб ти міг бачити
            catalog.unshift(model);
            localStorage.setItem('dryguny_catalog', JSON.stringify(catalog));
            renderCatalog();
            renderPublicShop();
            alert("Додано локально! Щоб додати назавжди, використовуй команду /addtoshop у боті.");
        }

        function renderCatalog() {
            const list = document.getElementById('catalog-list');
            list.innerHTML = catalog.map((item, i) => `
                <div class="catalog-item">
                    <div><b>${item.name}</b><br><small>${item.category} | ${item.price || item.calculated_price}₴</small></div>
                </div>`).join('');
        }

        function roundPrice() {
            let p = parseInt(document.getElementById('res').innerText);
            document.getElementById('res').innerText = (Math.ceil(p / 10) * 10) + " ₴";
        }

        function saveSettings() {
            const s = {
                p_price: document.getElementById('p_price').value,
                spool_w: document.getElementById('spool_w').value,
                val_amort: document.getElementById('val_amort').value,
                val_light: document.getElementById('val_light').value,
                val_work_hour: document.getElementById('val_work_hour').value,
                val_adhesion: document.getElementById('val_adhesion').value
            };
            localStorage.setItem('dryguny_settings', JSON.stringify(s));
            calc();
        }

        function applyDiscountType() {
            const val = document.getElementById('discount_type').value;
            if(val === 'custom') document.getElementById('custom_m_box').style.display = 'block';
            else {
                document.getElementById('custom_m_box').style.display = 'none';
                document.getElementById('m').value = val;
            }
            calc();
        }

        function filterShop(cat, btn) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderPublicShop(cat);
        }

        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('dryguny_settings') || '{}');
            for(let key in s) if(document.getElementById(key)) document.getElementById(key).value = s[key];
            loadProductsFromBot(); // ТУТ ЗАВАНТАЖУЄМО ТОВАРИ
            calc();
        };
    </script>
</body>
</html>
