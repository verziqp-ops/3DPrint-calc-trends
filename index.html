<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dryguny Pro v48.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #ff5722; --bg: #0b0b0b; --card-bg: #161616; 
            --text: #ffffff; --gray: #888; --input: #222222; --border: rgba(255,255,255,0.08);
            --success: #4caf50; --danger: #f44336;
        }
        .light-theme {
            --bg: #f5f5f5; --card-bg: #ffffff; --text: #1a1a1a; 
            --gray: #666; --input: #ececec; --border: rgba(0,0,0,0.05);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; padding-bottom: 120px; transition: 0.3s; }
        
        /* Theme Toggle */
        .theme-toggle { position: absolute; top: 15px; right: 15px; background: var(--input); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 100; }

        .main-nav { display: none; gap: 10px; margin-bottom: 25px; background: var(--input); padding: 6px; border-radius: 18px; border: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 14px; border: none; border-radius: 14px; background: none; color: var(--gray); font-weight: 700; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: white; }

        /* Categories Filter */
        .cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .cat-chip { padding: 8px 16px; background: var(--input); border-radius: 12px; font-size: 12px; white-space: nowrap; border: 1px solid var(--border); cursor: pointer; }
        .cat-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Shop Grid */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #111; cursor: pointer; }
        .product-info { padding: 12px; }
        .product-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .product-price { color: var(--accent); font-weight: 900; font-size: 16px; }
        
        /* Admin */
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .sub-tab { padding: 10px 18px; background: var(--input); border-radius: 14px; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--gray); border: 1px solid var(--border); white-space: nowrap; }
        .sub-tab.active { background: #2a2a2a; color: white; border-color: var(--accent); }
        .admin-section { display: none; }
        .admin-section.active { display: block; }

        /* UI Elements */
        .card { background: var(--card-bg); border-radius: 24px; padding: 18px; border: 1px solid var(--border); margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--gray); font-weight: 800; margin: 12px 0 6px 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 16px; border: 1px solid var(--border); background: var(--input); color: var(--text); box-sizing: border-box; font-size: 15px; }
        .row { display: flex; gap: 12px; margin-bottom: 5px; }
        .main-btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        /* Stats */
        .price-big { font-size: 48px; font-weight: 950; color: var(--accent); text-align: center; margin: 15px 0; }
        .stats-box { display: flex; justify-content: space-around; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 18px; margin-bottom: 20px; }

        /* Floating Cart */
        #cart-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 18px 32px; border-radius: 40px; font-weight: 900; display: none; z-index: 1000; box-shadow: 0 10px 25px rgba(255,87,34,0.5); }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 2000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: var(--card-bg); border-radius: 30px; padding: 25px; width: 100%; max-width: 420px; position: relative; }
        .modal-img { width: 100%; border-radius: 20px; margin-bottom: 15px; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: #000; color: #fff; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .list-item { background: var(--input); padding: 14px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">☀️</button>

    <div class="main-nav" id="admin-nav">
        <button class="nav-btn active" id="btn-shop" onclick="switchView('shop')">🛍 МАГАЗИН</button>
        <button class="nav-btn" id="btn-admin" onclick="switchView('admin')">🔒 АДМІН</button>
    </div>

    <div id="view-shop">
        <div style="font-weight: 900; font-size: 24px; margin-bottom: 20px;">DRYGUNY<span style="color:var(--accent)">3D</span></div>
        
        <div class="cat-scroll" id="cat-filter">
            <div class="cat-chip active" onclick="filterShop('Всі', this)">Всі</div>
            <div class="cat-chip" onclick="filterShop('Дім', this)">🏠 Дім</div>
            <div class="cat-chip" onclick="filterShop('Брелоки', this)">🔑 Брелоки</div>
            <div class="cat-chip" onclick="filterShop('Фігурки', this)">🐉 Фігурки</div>
            <div class="cat-chip" onclick="filterShop('Інше', this)">📦 Інше</div>
        </div>

        <div class="shop-grid" id="shop-container">Завантаження...</div>
    </div>

    <div id="view-admin" style="display:none">
        <div class="admin-tabs">
            <div class="sub-tab active" onclick="switchAdminTab('tab-calc', this)">🧮 КАЛЬКУЛЯТОР</div>
            <div class="sub-tab" onclick="switchAdminTab('tab-orders', this)">📥 ЗАМОВЛЕННЯ</div>
            <div class="sub-tab" onclick="switchAdminTab('tab-catalog', this)">📖 КАТАЛОГ</div>
            <div class="sub-tab" onclick="switchAdminTab('tab-config', this)">⚙️ НАЛАШТУВАННЯ</div>
        </div>

        <div id="tab-calc" class="admin-section active">
            <div class="price-big" id="res-price">0 ₴</div>
            <div class="stats-box">
                <div style="text-align:center"><div style="font-size:10px; color:var(--gray)">Собівартість</div><div id="info-cost" style="font-weight:800">0 ₴</div></div>
                <div style="text-align:center"><div style="font-size:10px; color:var(--gray)">Прибуток</div><div id="info-profit" style="font-weight:800; color:var(--success)">0 ₴</div></div>
            </div>
            
            <div class="card">
                <input type="text" id="p_name" placeholder="Назва моделі">
                <textarea id="p_desc" placeholder="Опис для покупця" style="margin-top:10px; height:60px;"></textarea>
                <label>Фото</label>
                <input type="file" accept="image/*" onchange="processImage(this)">
                
                <div class="row">
                    <div><label>Категорія для магазу</label>
                        <select id="p_cat">
                            <option value="Дім">🏠 Дім</option>
                            <option value="Брелоки">🔑 Брелоки</option>
                            <option value="Фігурки">🐉 Фігурки</option>
                            <option value="Інше">📦 Інше</option>
                        </select>
                    </div>
                    <div><label>Вага (г)</label><input type="number" id="w" value="0" oninput="calculateAll()"></div>
                </div>

                <div class="row">
                    <div><label>Години</label><input type="number" id="t_h" value="0" oninput="calculateAll()"></div>
                    <div><label>Хвилини</label><input type="number" id="t_m" value="0" oninput="calculateAll()"></div>
                </div>

                <div class="row">
                    <div><label>Брак (%)</label><input type="number" id="p_fail" value="5" oninput="calculateAll()"></div>
                    <div><label>Націнка (%)</label><input type="number" id="m_val" value="100" oninput="calculateAll()"></div>
                </div>
                <button class="main-btn" onclick="uploadToStore()">🚀 ВИСТАВИТИ ТОВАР</button>
            </div>
        </div>

        <div id="tab-orders" class="admin-section"><div id="orders-list"></div></div>
        <div id="tab-catalog" class="admin-section"><div id="catalog-list"></div></div>
        <div id="tab-config" class="admin-section">
            <div class="card">
                <label>Ціна катушки</label><input type="number" id="conf_p_price" value="850" oninput="calculateAll()">
                <label>Вага катушки</label><input type="number" id="conf_p_weight" value="1000" oninput="calculateAll()">
                <label>Амортизація</label><input type="number" id="conf_amort" value="5" oninput="calculateAll()">
                <label>Електрика</label><input type="number" id="conf_light" value="1.5" oninput="calculateAll()">
                <label>Робота</label><input type="number" id="conf_work" value="50" oninput="calculateAll()">
                <label>Адгезія</label><input type="number" id="conf_adh" value="5" oninput="calculateAll()">
            </div>
        </div>
    </div>

    <div id="cart-bar" onclick="openCheckout()">🛒 КОШИК: <span id="cart-count">0</span></div>

    <div id="modal-product" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModals()">✕</div>
            <img id="view-img" class="modal-img">
            <h2 id="view-title" style="margin:0"></h2>
            <div id="view-price" style="font-size:24px; color:var(--accent); font-weight:900; margin:10px 0;"></div>
            <p id="view-desc" style="font-size:14px; color:var(--gray);"></p>
            
            <label>Кількість (шт)</label>
            <input type="number" id="buy-count" value="1" min="1">
            <button class="main-btn" id="add-to-cart-btn">ДОДАТИ В КОШИК</button>
        </div>
    </div>

    <div id="modal-checkout" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Ваше замовлення</h2>
            <div id="cart-items" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
            <input type="text" id="cust-name" placeholder="Ваше ПІБ">
            <input type="tel" id="cust-phone" placeholder="Телефон" style="margin-top:10px;">
            <button class="main-btn" onclick="sendOrder()">ОФОРМИТИ</button>
            <button class="main-btn" style="background:none; color:var(--gray);" onclick="closeModals()">НАЗАД</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 6259271140;
        const DB = "https://magazin-7f3f2-default-rtdb.europe-west1.firebasedatabase.app/";
        
        let catalog = [], cart = [], encodedPhoto = "", currentCat = "Всі";

        window.onload = () => {
            tg.expand();
            if (tg.initDataUnsafe?.user?.id === ADMIN_ID) document.getElementById('admin-nav').style.display = 'flex';
            loadSettings();
            syncCatalog();
            if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
        };

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }

        function switchView(v) {
            document.getElementById('view-shop').style.display = v==='shop'?'block':'none';
            document.getElementById('view-admin').style.display = v==='admin'?'block':'none';
            document.getElementById('btn-shop').classList.toggle('active', v==='shop');
            document.getElementById('btn-admin').classList.toggle('active', v==='admin');
        }

        function switchAdminTab(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'tab-orders') syncOrders();
            if(id === 'tab-catalog') renderCatalogEditor();
        }

        // --- CALCULATOR (NO CHANGES IN FORMULAS) ---
        function calculateAll() {
            const w = parseFloat(document.getElementById('w').value) || 0;
            const fail = parseFloat(document.getElementById('p_fail').value) || 0;
            const pPrice = parseFloat(document.getElementById('conf_p_price').value) || 850;
            const pWeight = parseFloat(document.getElementById('conf_p_weight').value) || 1000;
            const matCost = (w * (1 + fail/100)) * (pPrice / pWeight);
            const hours = (parseFloat(document.getElementById('t_h').value)||0) + (parseFloat(document.getElementById('t_m').value)/60);
            const timeCost = hours * (parseFloat(document.getElementById('conf_amort').value) + parseFloat(document.getElementById('conf_light').value));
            const fixCosts = parseFloat(document.getElementById('conf_work').value) + parseFloat(document.getElementById('conf_adh').value);
            const margin = parseFloat(document.getElementById('m_val').value) / 100;
            const cost = matCost + timeCost + fixCosts;
            const price = (matCost + timeCost) * (1 + margin) + fixCosts;
            document.getElementById('res-price').innerText = Math.round(price) + " ₴";
            document.getElementById('info-cost').innerText = Math.round(cost) + " ₴";
            document.getElementById('info-profit').innerText = Math.round(price - cost) + " ₴";
            saveSettings(); return Math.round(price);
        }

        function processImage(input) {
            const reader = new FileReader();
            reader.onload = e => encodedPhoto = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        async function uploadToStore() {
            const name = document.getElementById('p_name').value;
            if(!name || !encodedPhoto) return alert("Потрібні назва та фото!");
            const product = { id: Date.now(), name, desc: document.getElementById('p_desc').value, price: calculateAll(), category: document.getElementById('p_cat').value, img: encodedPhoto };
            await fetch(`${DB}/catalog/${product.id}.json`, { method: 'PUT', body: JSON.stringify(product) });
            alert("Товар додано!"); syncCatalog();
        }

        async function syncCatalog() {
            const res = await fetch(`${DB}/catalog.json`);
            const data = await res.json();
            catalog = data ? Object.values(data) : [];
            renderShop();
        }

        function filterShop(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderShop();
        }

        function renderShop() {
            const container = document.getElementById('shop-container');
            const filtered = currentCat === "Всі" ? catalog : catalog.filter(p => p.category === currentCat);
            container.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">${p.price} ₴</div>
                    </div>
                </div>`).join('');
        }

        function openProduct(id) {
            const p = catalog.find(x => x.id === id);
            document.getElementById('view-img').src = p.img;
            document.getElementById('view-title').innerText = p.name;
            document.getElementById('view-price').innerText = p.price + " ₴";
            document.getElementById('view-desc').innerText = p.desc || "Немає опису";
            document.getElementById('buy-count').value = 1;
            document.getElementById('add-to-cart-btn').onclick = () => addToCart(p.id);
            document.getElementById('modal-product').style.display = 'flex';
        }

        function addToCart(id) {
            const p = catalog.find(x => x.id === id);
            const count = parseInt(document.getElementById('buy-count').value) || 1;
            cart.push({ ...p, count });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-bar').style.display = 'block';
            closeModals();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function openCheckout() {
            document.getElementById('modal-checkout').style.display = 'flex';
            document.getElementById('cart-items').innerHTML = cart.map((it, i) => `
                <div class="list-item">
                    <span>${it.name} (x${it.count})</span>
                    <b style="color:var(--danger)" onclick="removeFromCart(${i})">✕</b>
                </div>`).join('');
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            if(!cart.length) { closeModals(); document.getElementById('cart-bar').style.display = 'none'; }
            else openCheckout();
            document.getElementById('cart-count').innerText = cart.length;
        }

        async function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !phone) return alert("Заповніть дані!");
            const order = { 
                id: Date.now(), customer: name, phone, 
                items: cart.map(i => `${i.name} x${i.count}`).join(", "), 
                total: cart.reduce((s, i) => s + (i.price * i.count), 0) 
            };
            await fetch(`${DB}/orders/${order.id}.json`, { method: 'PUT', body: JSON.stringify(order) });
            tg.showAlert("Замовлення надіслано!"); cart = []; closeModals(); document.getElementById('cart-bar').style.display = 'none';
        }

        async function syncOrders() {
            const res = await fetch(`${DB}/orders.json`);
            const data = await res.json();
            document.getElementById('orders-list').innerHTML = data ? Object.values(data).reverse().map(o => `
                <div class="card">
                    <b>${o.customer}</b> | ${o.total} ₴<br><small>${o.phone}</small><hr style="border:0;border-top:1px solid var(--border)">
                    <div style="font-size:12px; color:var(--gray)">${o.items}</div>
                    <div class="row" style="margin-top:10px;">
                        <button class="sub-tab" style="background:var(--success); color:white; flex:1" onclick="copyOrder('${o.            </div>
        </div>

        <div id="tab-orders" class="admin-section"><div id="orders-list"></div></div>
        <div id="tab-catalog" class="admin-section"><div id="catalog-list"></div></div>

        <div id="tab-config" class="admin-section">
            <div class="card">
                <label>Ціна котушки (₴)</label><input type="number" id="conf_p_price" value="850" oninput="calculateAll()">
                <label>Вага котушки (г)</label><input type="number" id="conf_p_weight" value="1000" oninput="calculateAll()">
                <label>Амортизація (₴/год)</label><input type="number" id="conf_amort" value="5" oninput="calculateAll()">
                <label>Електрика (₴/год)</label><input type="number" id="conf_light" value="1.5" oninput="calculateAll()">
                <label>Робота (₴/фікс)</label><input type="number" id="conf_work" value="50" oninput="calculateAll()">
                <label>Адгезія (₴)</label><input type="number" id="conf_adh" value="5" oninput="calculateAll()">
            </div>
        </div>
    </div>

    <div id="cart-bar" onclick="openOrderModal()">🛒 КОШИК: <span id="cart-count">0</span></div>

    <div id="modal-checkout" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Оформлення</h2>
            <div id="cart-items-preview" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
            <input type="text" id="cust-name" placeholder="Твоє ПІБ">
            <input type="tel" id="cust-phone" placeholder="Телефон" style="margin-top:10px;">
            <button class="main-btn" onclick="submitOrder()">ВІДПРАВИТИ ЗАМОВЛЕННЯ</button>
            <button class="main-btn" style="background:none; color:var(--gray);" onclick="closeModals()">ЗАКРИТИ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 6259271140;
        const DB = "https://magazin-7f3f2-default-rtdb.europe-west1.firebasedatabase.app/";
        
        let localCatalog = [], userCart = [], encodedPhoto = "";

        window.onload = () => {
            tg.expand();
            if (tg.initDataUnsafe?.user?.id === ADMIN_ID) document.getElementById('admin-nav').style.display = 'flex';
            loadSettings();
            syncCatalog();
        };

        function switchView(v) {
            document.getElementById('view-shop').style.display = v==='shop'?'block':'none';
            document.getElementById('view-admin').style.display = v==='admin'?'block':'none';
            document.getElementById('btn-shop').classList.toggle('active', v==='shop');
            document.getElementById('btn-admin').classList.toggle('active', v==='admin');
        }

        function switchAdminTab(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'tab-orders') syncOrders();
            if(id === 'tab-catalog') renderCatalogEditor();
        }

        function calculateAll() {
            const w = parseFloat(document.getElementById('w').value) || 0;
            const fail = parseFloat(document.getElementById('p_fail').value) || 0;
            const pPrice = parseFloat(document.getElementById('conf_p_price').value) || 850;
            const pWeight = parseFloat(document.getElementById('conf_p_weight').value) || 1000;
            
            const netWeight = w * (1 + fail/100);
            const matCost = netWeight * (pPrice / pWeight);
            const hours = (parseFloat(document.getElementById('t_h').value)||0) + (parseFloat(document.getElementById('t_m').value)/60);
            const timeCost = hours * (parseFloat(document.getElementById('conf_amort').value) + parseFloat(document.getElementById('conf_light').value));
            const fixCosts = parseFloat(document.getElementById('conf_work').value) + parseFloat(document.getElementById('conf_adh').value);
            const margin = parseFloat(document.getElementById('m_val').value) / 100;
            
            const cost = matCost + timeCost + fixCosts;
            const price = (matCost + timeCost) * (1 + margin) + fixCosts;
            
            document.getElementById('res-price').innerText = Math.round(price) + " ₴";
            document.getElementById('info-cost').innerText = Math.round(cost) + " ₴";
            document.getElementById('info-profit').innerText = Math.round(price - cost) + " ₴";
            saveSettings();
            return Math.round(price);
        }

        function processImage(input) {
            const reader = new FileReader();
            reader.onload = e => encodedPhoto = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        async function uploadToStore() {
            const name = document.getElementById('p_name').value;
            if(!name || !encodedPhoto) return alert("Треба назву і фото!");
            const product = { id: Date.now(), name, desc: document.getElementById('p_desc').value, price: calculateAll(), category: document.getElementById('p_cat').value, img: encodedPhoto };
            await fetch(`${DB}/catalog/${product.id}.json`, { method: 'PUT', body: JSON.stringify(product) });
            alert("Товар у магазині!"); syncCatalog();
        }

        async function syncCatalog() {
            const res = await fetch(`${DB}/catalog.json`);
            const data = await res.json();
            localCatalog = data ? Object.values(data) : [];
            renderShop();
        }

        function renderShop() {
            document.getElementById('shop-container').innerHTML = localCatalog.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">${p.price} ₴</div>
                        <button class="main-btn" style="padding:10px; font-size:12px;" onclick="addToCart(${p.id})">КУПИТИ</button>
                    </div>
                </div>`).join('');
        }

        function addToCart(id) {
            userCart.push(localCatalog.find(p => p.id === id));
            document.getElementById('cart-count').innerText = userCart.length;
            document.getElementById('cart-bar').style.display = 'block';
            tg.HapticFeedback.impactOccurred('light');
        }

        function openOrderModal() {
            document.getElementById('modal-checkout').style.display = 'flex';
            document.getElementById('cart-items-preview').innerHTML = userCart.map((it, i) => `
                <div class="list-item"><span>${it.name}</span><b style="color:var(--danger)" onclick="removeFromCart(${i})">✕</b></div>`).join('');
        }

        function removeFromCart(i) {
            userCart.splice(i, 1);
            if(!userCart.length) { closeModals(); document.getElementById('cart-bar').style.display = 'none'; }
            else openOrderModal();
            document.getElementById('cart-count').innerText = userCart.length;
        }

        async function submitOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !phone) return alert("Введи дані!");
            const order = { id: Date.now(), customer: name, phone, items: userCart.map(i => i.name).join(", "), total: userCart.reduce((s, i) => s + i.price, 0) };
            await fetch(`${DB}/orders/${order.id}.json`, { method: 'PUT', body: JSON.stringify(order) });
            tg.showAlert("Готово! Чекайте на дзвінок."); userCart = []; closeModals(); document.getElementById('cart-bar').style.display = 'none';
        }

        async function syncOrders() {
            const res = await fetch(`${DB}/orders.json`);
            const data = await res.json();
            const list = document.getElementById('orders-list');
            if(!data) { list.innerHTML = "Замовлень немає"; return; }
            list.innerHTML = Object.values(data).reverse().map(o => `
                <div class="card">
                    <b>${o.customer}</b> | ${o.total} ₴<br><small>${o.phone}</small><br>
                    <div style="font-size:11px; color:var(--gray); background:#000; padding:10px; border-radius:10px; margin-top:10px;">${o.items}</div>
                    <div class="row" style="margin-top:10px;">
                        <button class="sub-tab" style="background:var(--success); color:white; flex:1" onclick="copyOrder('${o.customer}','${o.phone}','${o.items}','${o.total}')">📋 КОПІЮВАТИ</button>
                        <button class="sub-tab" style="background:var(--danger); color:white;" onclick="deleteOrder('${o.id}')">✕</button>
                    </div>
                </div>`).join('');
        }

        function renderCatalogEditor() {
            document.getElementById('catalog-list').innerHTML = localCatalog.map(p => `
                <div class="list-item"><span>${p.name}</span><button class="sub-tab" style="background:var(--danger); color:white;" onclick="deleteProduct('${p.id}')">ВИДАЛИТИ</button></div>`).join('');
        }

        async function deleteProduct(id) { if(confirm("Видалити?")) { await fetch(`${DB}/catalog/${id}.json`, {method:'DELETE'}); syncCatalog(); setTimeout(renderCatalogEditor, 500); } }
        async function deleteOrder(id) { if(confirm("Видалити?")) { await fetch(`${DB}/orders/${id}.json`, {method:'DELETE'}); syncOrders(); } }
        function copyOrder(c,p,i,t) { navigator.clipboard.writeText(`Клієнт: ${c}\nТел: ${p}\nТовари: ${i}\nСума: ${t} ₴`); alert("Скопійовано!"); }
        function saveSettings() {
            const s = {};
            ['conf_p_price','conf_p_weight','conf_amort','conf_light','conf_work','conf_adh','p_fail','m_val'].forEach(id => s[id] = document.getElementById(id).value);
            localStorage.setItem('dryguny_settings', JSON.stringify(s));
        }
        function loadSettings() {
            const s = JSON.parse(localStorage.getItem('dryguny_settings') || '{}');
            for(let k in s) if(document.getElementById(k)) document.getElementById(k).value = s[k];
        }
        function closeModals() { document.getElementById('modal-checkout').style.display = 'none'; }
    </script>
</body>
</html>
