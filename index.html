<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --purp: #bb86fc; --cyan: #03dac6; --bg: #0b0b0e; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .tabs { 
            display: flex; background: rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 360px;
        }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            background: none; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--purp); color: white; box-shadow: 0 0 15px rgba(187,134,252,0.4); }

        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 20px; width: 100%; max-width: 360px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none;
        }
        .card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .price-tag { font-size: 48px; font-weight: 900; color: var(--cyan); text-align: center; margin: 15px 0; text-shadow: 0 0 20px rgba(3,218,198,0.3); }
        
        label { display: block; margin: 15px 0 5px 5px; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(0,0,0,0.4); color: white; font-size: 16px; box-sizing: border-box; outline: none; margin-bottom: 5px;
        }

        .switch-box {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin: 8px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider-round:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider-round { background-color: var(--purp); }
        input:checked + .slider-round:before { transform: translateX(22px); }

        .slider-range { width: 100%; -webkit-appearance: none; height: 6px; background: #222; border-radius: 5px; margin: 10px 0; }
        .slider-range::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--purp); border-radius: 50%; cursor: pointer; }

        .main-btn { 
            background: linear-gradient(135deg, #6200ee, #9d50bb); color: white; 
            border: none; padding: 18px; border-radius: 18px; width: 100%; 
            font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 15px;
        }
        .secondary-btn {
            background: rgba(255,255,255,0.05); color: white; border: 1px solid #444;
            padding: 10px; border-radius: 12px; width: 48%; font-size: 10px; cursor: pointer;
        }
        .flex-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }

        .history-item { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 3px solid var(--purp); cursor: pointer;
        }

        .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; border: 1px solid #fff; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">💎 Розрахунок</button>
        <button class="tab-btn" onclick="openTab('colors', this)">🎨 Кольори</button>
    </div>

    <div id="calc" class="card active">
        <div class="price-tag" id="res">0 ₴</div>
        
        <label>💳 Карта Monobank</label>
        <input type="text" id="mono_card" placeholder="0000 0000 0000 0000" oninput="saveMono()">

        <label>⚙️ Назва замовлення</label>
        <input type="text" id="p1_name" placeholder="Назва для історії...">
        <div class="flex-row">
            <button class="secondary-btn" onclick="saveProfile(1)">Зберегти П1</button>
            <button class="secondary-btn" onclick="loadProfile(1)">Завантажити П1</button>
        </div>

        <label>🖨️ Принтер</label>
        <select id="printer" onchange="calc()">
            <option value="150">Bambu Lab A1 (150W)</option>
            <option value="80">Bambu Lab A1 Mini (80W)</option>
            <option value="350">Bambu Lab P1S/P (350W)</option>
        </select>

        <label>💰 Пластик (грн/кг)</label>
        <input type="number" id="p" value="800" oninput="calc()">

        <div class="switch-box">
            <span style="font-size: 13px; font-weight: bold;">📦 Крафт пакування (+40₴)</span>
            <label class="switch">
                <input type="checkbox" id="pack_check" onchange="calc()">
                <span class="slider-round"></span>
            </label>
        </div>

        <div class="switch-box" style="border-color: var(--cyan);">
            <span style="font-size: 13px; font-weight: bold; color: var(--cyan);">🇺🇦 Донат на ЗСУ</span>
            <select id="zsu_amount" style="width: 80px; margin: 0; padding: 5px; font-size: 12px;" onchange="calc()">
                <option value="0">0 ₴</option>
                <option value="20">20 ₴</option>
                <option value="50">50 ₴</option>
                <option value="100">100 ₴</option>
            </select>
        </div>
        
        <label>⚖️ Вага (г)</label>
        <input type="number" id="w" placeholder="0" oninput="calc()">
        
        <label>⏱️ Час (год)</label>
        <input type="number" id="t" placeholder="0" oninput="calc()">
        
        <div style="display:flex; justify-content:space-between; margin-top:10px">
            <label>⚠️ Брак: <span id="bLabel" style="color:var(--cyan)">5%</span></label>
            <label>📈 Націнка: <span id="mLabel" style="color:var(--purp)">100%</span></label>
        </div>
        <input type="range" id="b" min="0" max="20" value="5" class="slider-range" oninput="calc()">
        <input type="range" id="m" min="0" max="500" value="100" class="slider-range" oninput="calc()">
        
        <button class="main-btn" onclick="copyCheck()">📋 КОПІЮВАТИ ЧЕК</button>

        <div id="history-container" style="margin-top: 25px;">
            <label>📜 Останні розрахунки</label>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="colors" class="card">
        <h3 style="margin-top:0">🎨 Наявні кольори</h3>
        <div id="color-list">
            <div style="padding: 10px; border-bottom: 1px solid #333;"><span class="color-dot" style="background: black;"></span> Black PLA</div>
            <div style="padding: 10px; border-bottom: 1px solid #333;"><span class="color-dot" style="background: white;"></span> White PLA</div>
            <div style="padding: 10px; border-bottom: 1px solid #333;"><span class="color-dot" style="background: red;"></span> Red PLA</div>
            <div style="padding: 10px; border-bottom: 1px solid #333;"><span class="color-dot" style="background: linear-gradient(to right, red, orange, yellow, green, blue, violet);"></span> Silk Rainbow</div>
            <div style="padding: 10px; border-bottom: 1px solid #333;"><span class="color-dot" style="background: #00ff00;"></span> Neon Green PETG</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('mono_card').value = localStorage.getItem('dry_mono') || "";
        renderHistory();

        function saveMono() { localStorage.setItem('dry_mono', document.getElementById('mono_card').value); }

        function calc() {
            let printerPower = document.getElementById('printer').value;
            let plastic = document.getElementById('p').value || 0;
            let weight = document.getElementById('w').value || 0;
            let time = document.getElementById('t').value || 0;
            let markup = document.getElementById('m').value;
            let scrap = document.getElementById('b').value;
            let packPrice = document.getElementById('pack_check').checked ? 40 : 0;
            let zsu = parseInt(document.getElementById('zsu_amount').value);
            
            document.getElementById('mLabel').innerText = markup + "%";
            document.getElementById('bLabel').innerText = scrap + "%";
            
            let electricity = (printerPower / 1000) * time * 4.32;
            let netCost = (weight * (plastic / 1000)) + electricity + (time * 5); 
            let final = (netCost * (1 + scrap / 100) * (1 + markup / 100)) + packPrice + zsu;
            
            document.getElementById('res').innerText = Math.round(final) + " ₴";
        }

        function copyCheck() {
            let res = document.getElementById('res').innerText;
            let card = document.getElementById('mono_card').value;
            let zsu = parseInt(document.getElementById('zsu_amount').value);
            let pName = document.getElementById('p1_name').value || "Деталь";
            
            if(!document.getElementById('w').value) return tg.showAlert("Введи вагу!");

            let zsuText = zsu > 0 ? `\n🇺🇦 Донат на ЗСУ включено: ${zsu} ₴` : "";
            let cardText = card ? `\n💳 Карта для оплати: ${card}` : "";
            
            let text = `🚀 Рахунок Dryguny:\n📦 Виріб: ${pName}${zsuText}\n💰 Сума: ${res}${cardText}\n\n🛠 Дякуємо за замовлення!`;
            
            navigator.clipboard.writeText(text).then(() => {
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Чек скопійовано!");
                saveToHistory(pName, res);
            });
        }

        function saveToHistory(name, price) {
            let hist = JSON.parse(localStorage.getItem('dry_hist_v3') || '[]');
            let data = {
                name, price,
                w: document.getElementById('w').value,
                t: document.getElementById('t').value,
                p: document.getElementById('p').value,
                m: document.getElementById('m').value,
                b: document.getElementById('b').value,
                pr: document.getElementById('printer').value,
                pk: document.getElementById('pack_check').checked,
                zs: document.getElementById('zsu_amount').value,
                date: new Date().toLocaleTimeString()
            };
            hist.unshift(data);
            if(hist.length > 5) hist.pop();
            localStorage.setItem('dry_hist_v3', JSON.stringify(hist));
            renderHistory();
        }

        function restore(i) {
            let hist = JSON.parse(localStorage.getItem('dry_hist_v3') || '[]');
            let d = hist[i];
            document.getElementById('p1_name').value = d.name;
            document.getElementById('w').value = d.w;
            document.getElementById('t').value = d.t;
            document.getElementById('p').value = d.p;
            document.getElementById('m').value = d.m;
            document.getElementById('b').value = d.b;
            document.getElementById('printer').value = d.pr;
            document.getElementById('pack_check').checked = d.pk;
            document.getElementById('zsu_amount').value = d.zs || 0;
            calc();
            tg.showAlert("Дані відновлено!");
        }

        function renderHistory() {
            let hist = JSON.parse(localStorage.getItem('dry_hist_v3') || '[]');
            document.getElementById('history-list').innerHTML = hist.map((h, i) => `
                <div class="history-item" onclick="restore(${i})">
                    <span>${h.name} <small>(${h.date})</small></span>
                    <b>${h.price}</b>
                </div>
            `).join('');
        }

        function openTab(id, btn) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function saveProfile(id) {
            const prof = { name: document.getElementById('p1_name').value, p: document.getElementById('p').value, m: document.getElementById('m').value };
            localStorage.setItem('prof_'+id, JSON.stringify(prof));
            tg.showAlert("Збережено!");
        }

        function loadProfile(id) {
            const d = JSON.parse(localStorage.getItem('prof_'+id));
            if(d) { document.getElementById('p').value = d.p; document.getElementById('m').value = d.m; document.getElementById('p1_name').value = d.name; calc(); }
        }
    </script>
</body>
</html>
