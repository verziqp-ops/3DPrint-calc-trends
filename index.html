<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Pro v33.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #ff5722; --bg: #fdfaf5; --card-bg: #ffffff; 
            --text: #2c2c2c; --gray: #9e9e9e; --input: #f7f3f0;
            --border: rgba(0,0,0,0.06); --banner-bg: #000000;
        }
        body.dark { 
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #f0f0f0; 
            --gray: #777; --input: #262626; --border: rgba(255,255,255,0.05);
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; transition: 0.4s; }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 10px; border-radius: 12px; cursor: pointer; }

        .price-banner { 
            background: var(--banner-bg); color: white; width: 100%; max-width: 440px; 
            padding: 25px; border-radius: 28px; text-align: center; margin: 0 auto 25px; 
            position: sticky; top: 10px; z-index: 100; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .price-tag { font-size: 52px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .banner-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1.5px; }
        
        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            margin-top: 20px; padding-top: 15px; border-top: 1px solid #222;
        }
        .stat-item { text-align: center; font-size: 13px; }
        .stat-item span { display: block; color: var(--gray); font-size: 9px; margin-bottom: 4px; text-transform: uppercase; }

        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; width: 100%; max-width: 440px; box-sizing: border-box; margin: 0 auto 20px; border: 1px solid var(--border); }
        .section-title { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .tabs { display: flex; background: var(--input); border-radius: 16px; padding: 5px; margin: 0 auto 20px; width: 100%; max-width: 440px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: none; color: var(--gray); font-weight: bold; cursor: pointer; font-size: 12px; }
        .tab-btn.active { background: var(--accent); color: white; }

        label { display: block; margin: 15px 0 6px 4px; font-size: 10px; color: var(--gray); font-weight: 700; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 16px; border: none; background: var(--input); color: var(--text); font-size: 16px; outline: none; box-sizing: border-box; }
        
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .row > div { flex: 1; }

        /* ТУМБЛЕРИ */
        .switch-box { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; background: var(--input); border-radius: 18px; margin-bottom: 10px; }
        .switch-box span { font-size: 13px; font-weight: 600; }
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .main-btn { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 15px; }
        
        .history-item { 
            background: var(--input); padding: 15px; border-radius: 18px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            transition: 0.2s;
        }
        .history-item:active { transform: scale(0.97); }
        .history-info b { display: block; font-size: 15px; }
        .history-info span { font-size: 11px; color: var(--gray); }

        input[type=range] { width: 100%; accent-color: var(--accent); margin: 10px 0; }
    </style>
</head>
<body class="dark">

    <div class="header-box">
        <div style="font-weight: 900; font-size: 20px;">DRYGUNY <span style="color:var(--accent)">3D</span></div>
        <button class="theme-toggle" onclick="document.body.classList.toggle('dark')">🌓</button>
    </div>

    <div class="price-banner">
        <div class="banner-label">Ціна для клієнта</div>
        <div id="res" class="price-tag">0 ₴</div>
        <div class="stats-grid">
            <div class="stat-item"><span>Собівартість</span><b id="total_cost">0</b> ₴</div>
            <div class="stat-item"><span>Прибуток</span><b style="color:var(--accent)" id="profit_val">0</b> ₴</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">КАЛЬКУЛЯТОР</button>
        <button class="tab-btn" onclick="openTab('modelling', this)">МОДЕЛЮВАННЯ</button>
        <button class="tab-btn" onclick="openTab('history', this)">📜 ІСТОРІЯ</button>
    </div>

    <div id="calc" class="card" style="display:block">
        <div class="section-title">📦 ПАРАМЕТРИ ПРЕСЕТУ</div>
        <input type="text" id="p_name" placeholder="Назва моделі">
        <div class="row">
            <div><label>Вага моделі (г)</label><input type="number" id="w" value="0" oninput="calc()"></div>
            <div><label>К-сть (шт)</label><input type="number" id="qty" value="1" oninput="calc()"></div>
        </div>

        <div class="section-title" style="margin-top:10px">🧪 ПЛАСТИК</div>
        <div class="row">
            <div><label>Ціна (₴)</label><input type="number" id="p_price" value="850" oninput="calc()"></div>
            <div><label>Вага котушки (г)</label><input type="number" id="spool_w" value="1000" oninput="calc()"></div>
        </div>

        <div class="section-title" style="margin-top:10px">⏱️ ЧАС ТА ПРИНТЕР</div>
        <div class="row">
            <div><label>Години</label><input type="number" id="t_h" value="0" oninput="calc()"></div>
            <div><label>Хвилини</label><input type="number" id="t_m" value="0" oninput="calc()"></div>
        </div>

        <div class="row">
            <div style="flex: 2;">
                <label>Принтер</label>
                <select id="printer" onchange="calc()">
                    <option value="5">Bambu A1 (5 ₴/год)</option>
                    <option value="10">Bambu X1C (10 ₴/год)</option>
                    <option value="150">Ставка оператора (150/год)</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>Брак: <span id="fLabel">5%</span></label>
                <input type="range" id="fail" min="0" max="30" value="5" oninput="calc()">
            </div>
        </div>

        <label>Націнка: <span style="color:var(--accent)" id="mLabel">100%</span></label>
        <input type="range" id="m" min="0" max="500" value="100" oninput="calc()">

        <div class="switch-box">
            <span>🚀 ТЕРМІНОВО (+20%)</span>
            <label class="switch">
                <input type="checkbox" id="is_urgent" onchange="calc()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-box">
            <span>📦 ПАКУВАННЯ (25 ₴)</span>
            <label class="switch">
                <input type="checkbox" id="is_packing" onchange="calc()">
                <span class="slider"></span>
            </label>
        </div>

        <button class="main-btn" onclick="saveAndCopy()">СКОПІЮВАТИ ТА ЗБЕРЕГТИ</button>
    </div>

    <div id="modelling" class="card" style="display:none">
        <div class="section-title">🎨 РОЗРОБКА МОДЕЛІ</div>
        <div class="row">
            <div>
                <label>Час роботи (год)</label>
                <input type="number" id="mod_h" value="0" oninput="calc()">
            </div>
            <div>
                <label>Ціна за годину (₴)</label>
                <input type="number" id="mod_rate" value="200" oninput="calc()">
            </div>
        </div>
        <label>Додаткові послуги (₴)</label>
        <input type="number" id="extra_service" value="0" oninput="calc()" placeholder="Напр. фарбування">
    </div>

    <div id="history" class="card" style="display:none">
        <div class="section-title">📜 ОСТАННІ ЧЕКИ</div>
        <div id="history-list"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let history = JSON.parse(localStorage.getItem('dryguny_history') || '[]');

        function calc() {
            let w = parseFloat(document.getElementById('w').value) || 0;
            let p_price = parseFloat(document.getElementById('p_price').value) || 0;
            let spool_w = parseFloat(document.getElementById('spool_w').value) || 1000;
            let fail = parseFloat(document.getElementById('fail').value) / 100;
            let h = parseFloat(document.getElementById('t_h').value) || 0;
            let min = parseFloat(document.getElementById('t_m').value) || 0;
            let qty = parseFloat(document.getElementById('qty').value) || 1;
            let amort = parseFloat(document.getElementById('printer').value) || 0;
            let m = parseFloat(document.getElementById('m').value);
            
            let modH = parseFloat(document.getElementById('mod_h').value) || 0;
            let modRate = parseFloat(document.getElementById('mod_rate').value) || 0;
            let extra = parseFloat(document.getElementById('extra_service').value) || 0;

            // Тумблери
            let urgent = document.getElementById('is_urgent').checked ? 1.20 : 1;
            let packing = document.getElementById('is_packing').checked ? 25 : 0;

            let totalTimeH = h + (min / 60);
            // Ціна пластику за 1 грам з урахуванням ваги котушки
            let pricePerGram = p_price / spool_w;
            let costPlast = (w * (1 + fail)) * pricePerGram;
            let costPrint = totalTimeH * amort;
            
            let productionCost = (costPlast + costPrint + packing) * qty;
            let modellingCost = (modH * modRate) + extra;
            
            let totalCost = productionCost + modellingCost;
            let finalPrice = (productionCost * (1 + m / 100) * urgent) + modellingCost;

            document.getElementById('res').innerText = Math.round(finalPrice) + " ₴";
            document.getElementById('total_cost').innerText = Math.round(totalCost);
            document.getElementById('profit_val').innerText = Math.round(finalPrice - totalCost);
            document.getElementById('mLabel').innerText = m + "%";
            document.getElementById('fLabel').innerText = Math.round(fail * 100) + "%";
        }

        function saveAndCopy() {
            let name = document.getElementById('p_name').value || "3D Модель";
            let price = document.getElementById('res').innerText;
            
            let entry = {
                id: Date.now(),
                name: name,
                price: price,
                date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                vals: {
                    w: document.getElementById('w').value,
                    pp: document.getElementById('p_price').value,
                    sw: document.getElementById('spool_w').value,
                    th: document.getElementById('t_h').value,
                    tm: document.getElementById('t_m').value,
                    q: document.getElementById('qty').value,
                    m: document.getElementById('m').value,
                    f: document.getElementById('fail').value,
                    pr: document.getElementById('printer').value,
                    mh: document.getElementById('mod_h').value,
                    mr: document.getElementById('mod_rate').value,
                    ex: document.getElementById('extra_service').value,
                    urg: document.getElementById('is_urgent').checked,
                    pack: document.getElementById('is_packing').checked
                }
            };
            
            history.unshift(entry);
            if(history.length > 15) history.pop();
            localStorage.setItem('dryguny_history', JSON.stringify(history));
            
            let checkText = `📦 Dryguny 3D\n🤖 Виріб: ${name}\n🔢 К-сть: ${document.getElementById('qty').value} шт\n💰 Ціна: ${price}\n\nДякуємо за замовлення!`;
            navigator.clipboard.writeText(checkText);
            
            tg.HapticFeedback.notificationOccurred('success');
            alert("Чек скопійовано та збережено! ✅");
        }

        function restore(id) {
            let item = history.find(x => x.id === id);
            if(!item) return;
            let v = item.vals;
            document.getElementById('p_name').value = item.name;
            document.getElementById('w').value = v.w;
            document.getElementById('p_price').value = v.pp;
            document.getElementById('spool_w').value = v.sw || 1000;
            document.getElementById('t_h').value = v.th;
            document.getElementById('t_m').value = v.tm;
            document.getElementById('qty').value = v.q;
            document.getElementById('m').value = v.m;
            document.getElementById('fail').value = v.f;
            document.getElementById('printer').value = v.pr;
            document.getElementById('mod_h').value = v.mh;
            document.getElementById('mod_rate').value = v.mr;
            document.getElementById('extra_service').value = v.ex;
            document.getElementById('is_urgent').checked = v.urg || false;
            document.getElementById('is_packing').checked = v.pack || false;
            
            openTab('calc', document.querySelector('.tab-btn'));
            calc();
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = history.length ? '' : '<p style="text-align:center;color:var(--gray)">Історія порожня</p>';
            history.forEach(item => {
                let div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => restore(item.id);
                div.innerHTML = `
                    <div class="history-info">
                        <b>${item.name}</b>
                        <span>${item.date} • ${item.vals.q} шт</span>
                    </div>
                    <b style="color:var(--accent)">${item.price}</b>
                `;
                container.appendChild(div);
            });
        }

        function openTab(id, btn) {
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
            if(id === 'history') renderHistory();
        }

        window.onload = calc;
    </script>
</body>
</html>
