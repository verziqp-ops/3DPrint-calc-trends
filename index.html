<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Hub v21.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #ff5722; --bg: #f8f7f2; --card-bg: #ffffff; --text: #333; --gray: #888; --input: #fafafa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .price-banner { background: #222; color: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; position: sticky; top: 10px; z-index: 100; box-sizing: border-box; }
        .price-tag { font-size: 42px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .sub-cost { font-size: 12px; opacity: 0.7; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.1); }
        .section-title { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; margin: 10px 0 5px 2px; font-size: 11px; color: var(--gray); text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); background: var(--input); color: var(--text); font-size: 16px; outline: none; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > div { flex: 1; }
        .mat-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .mat-btn { flex: 1; min-width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 12px; cursor: pointer; }
        .mat-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; }
        .main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-weight: 800; cursor: pointer; }
        .accent-text { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="price-banner">
        <div class="sub-cost">ЦІНА ПРОДАЖУ</div>
        <div id="res" class="price-tag">0 ₴</div>
        <div class="sub-cost">Собівартість: <span id="cost_res">0</span> ₴ | Прибуток: <span id="profit_res">0</span> ₴</div>
    </div>

    <div class="card" style="display: block;">
        <span class="section-title">🧵 Матеріал та Вага</span>
        <div class="mat-btns">
            <button class="mat-btn active" onclick="setMat('PLA', 850, this)">PLA</button>
            <button class="mat-btn" onclick="setMat('PETG', 750, this)">PETG</button>
            <button class="mat-btn" onclick="setMat('Silk', 1100, this)">Silk</button>
            <button class="mat-btn" onclick="setMat('Свій', 0, this)">Свій</button>
        </div>
        <div class="row">
            <div>
                <label>Вага (г)</label>
                <input type="number" id="w" value="0" oninput="calc()">
            </div>
            <div>
                <label>Ціна пластику (₴/кг)</label>
                <input type="number" id="plast_price" value="850" oninput="calc()">
            </div>
        </div>
        <label>Брак та підтримки: <span class="accent-text" id="bLabel">10%</span></label>
        <input type="range" id="b" min="0" max="30" value="10" style="width:100%; accent-color:var(--accent)" oninput="calc()">

        <span class="section-title" style="margin-top:20px">⚡ Електрика (Bambu A1)</span>
        <div class="row">
            <div>
                <label>Години</label>
                <input type="number" id="t_h" value="0" oninput="calc()">
            </div>
            <div>
                <label>Хвилини</label>
                <input type="number" id="t_m" value="0" oninput="calc()">
            </div>
        </div>
        <div class="row">
            <div>
                <label>Потужність (Вт)</label>
                <input type="number" id="pwr" value="200" oninput="calc()">
            </div>
            <div>
                <label>Тариф (₴/кВт)</label>
                <input type="number" id="tarif" value="4.32" oninput="calc()">
            </div>
        </div>

        <span class="section-title" style="margin-top:20px">🛠️ Додатково</span>
        <div class="row">
            <div>
                <label>Фурнітура (₴)</label>
                <input type="number" id="furn" value="0" placeholder="+ очі, магніти" oninput="calc()">
            </div>
            <div>
                <label>Пост-обробка (₴)</label>
                <input type="number" id="post" value="0" oninput="calc()">
            </div>
        </div>

        <span class="section-title" style="margin-top:20px">📈 Бізнес</span>
        <label>Націнка (Маржа): <span class="accent-text" id="mLabel">100%</span></label>
        <input type="range" id="m" min="0" max="500" value="100" style="width:100%; accent-color:var(--accent)" oninput="calc()">
        
        <div class="row" style="margin-top:10px">
            <div>
                <label>Кількість (шт)</label>
                <input type="number" id="qty" value="1" oninput="calc()">
            </div>
        </div>

        <button class="main-btn" style="margin-top:20px" onclick="copyResult()">📋 СКОПІЮВАТИ ЧЕК</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function setMat(name, price, btn) {
            document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(price > 0) document.getElementById('plast_price').value = price;
            calc();
        }

        function calc() {
            let weight = parseFloat(document.getElementById('w').value) || 0;
            let plastPrice = parseFloat(document.getElementById('plast_price').value) || 0;
            let brak = parseFloat(document.getElementById('b').value) / 100;
            
            let h = parseFloat(document.getElementById('t_h').value) || 0;
            let m = parseFloat(document.getElementById('t_m').value) || 0;
            let totalHours = h + (m / 60);
            
            let pwr = parseFloat(document.getElementById('pwr').value) || 0;
            let tarif = parseFloat(document.getElementById('tarif').value) || 0;
            let furn = parseFloat(document.getElementById('furn').value) || 0;
            let post = parseFloat(document.getElementById('post').value) || 0;
            let margin = parseFloat(document.getElementById('m').value) / 100;
            let qty = parseInt(document.getElementById('qty').value) || 1;

            // 1. Собівартість пластику (з урахуванням браку)
            let plasticCost = (weight * (1 + brak)) * (plastPrice / 1000);
            
            // 2. Собівартість електрики
            let electricCost = (pwr / 1000) * totalHours * tarif;
            
            // 3. Загальна собівартість на 1 шт
            let unitCost = plasticCost + electricCost + furn;
            
            // 4. Ціна продажу на 1 шт
            let unitPrice = (unitCost * (1 + margin)) + post;
            
            // Разом
            let totalSell = unitPrice * qty;
            let totalCost = unitCost * qty;

            document.getElementById('res').innerText = Math.round(totalSell) + " ₴";
            document.getElementById('cost_res').innerText = Math.round(totalCost);
            document.getElementById('profit_res').innerText = Math.round(totalSell - totalCost);
            document.getElementById('mLabel').innerText = document.getElementById('m').value + "%";
            document.getElementById('bLabel').innerText = document.getElementById('b').value + "%";
        }

        function copyResult() {
            let res = document.getElementById('res').innerText;
            navigator.clipboard.writeText("Dryguny Hub: Рахунок на суму " + res).then(() => {
                tg.showAlert("Скопійовано!");
            });
        }
    </script>
</body>
</html>
