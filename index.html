<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --purp: #bb86fc; --cyan: #03dac6; --bg: #0b0b0e; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .tabs { 
            display: flex; background: rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 360px;
        }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            background: none; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--purp); color: white; box-shadow: 0 0 15px rgba(187,134,252,0.4); }

        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 20px; width: 100%; max-width: 360px; box-sizing: border-box;
            display: none;
        }
        .card.active { display: block; }

        .price-tag { font-size: 48px; font-weight: 900; color: var(--cyan); text-align: center; margin: 15px 0; }
        
        label { display: block; margin: 15px 0 5px 5px; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(0,0,0,0.4); color: white; font-size: 16px; box-sizing: border-box; outline: none; margin-bottom: 5px;
        }

        .switch-box {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin: 8px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .main-btn { 
            background: linear-gradient(135deg, #6200ee, #9d50bb); color: white; 
            border: none; padding: 18px; border-radius: 18px; width: 100%; 
            font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 15px;
        }

        .zsu-stats {
            margin-top: 15px; padding: 12px; border-radius: 15px;
            background: rgba(3, 218, 198, 0.1); border: 1px dashed var(--cyan);
            text-align: center; font-size: 14px;
        }

        .history-item { 
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid var(--purp);
        }
        
        .color-item { 
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; 
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #555; margin-right: 10px; }
        .slider-range { width: 100%; margin: 10px 0; accent-color: var(--purp); }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc', this)">💎 Чек</button>
        <button class="tab-btn" onclick="openTab('colors', this)">🎨 Кольори</button>
    </div>

    <div id="calc" class="card active">
        <div class="price-tag" id="res">0 ₴</div>
        
        <label>⚙️ Основна інформація</label>
        <input type="text" id="p1_name" placeholder="Назва виробу (напр. Вовк)">
        
        <label>📅 Термін виготовлення</label>
        <select id="deadline">
            <option value="сьогодні-завтра">🚀 Терміново (сьогодні-завтра)</option>
            <option value="2-3 дні">⏳ Стандарт (2-3 дні)</option>
            <option value="тиждень">📅 Черга (тиждень)</option>
        </select>

        <label>🚚 Спосіб доставки</label>
        <select id="shipping">
            <option value="Нова Пошта">📦 Нова Пошта</option>
            <option value="Укрпошта">🐌 Укрпошта</option>
            <option value="Самовивіз (ТЕРНОПІЛЬ)">🏙️ Самовивіз (Тернопіль)</option>
        </select>

        <label>💳 Карта для оплати</label>
        <input type="text" id="mono_card" placeholder="0000 0000 0000 0000" oninput="saveMono()">

        <label>🖨️ Принтер та налаштування</label>
        <select id="printer" onchange="calc()">
            <option value="150">Bambu Lab A1 (150W)</option>
            <option value="80">Bambu Lab A1 Mini (80W)</option>
            <option value="350">Bambu Lab P1S/P (350W)</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>⚖️ Вага (г)</label><input type="number" id="w" placeholder="0" oninput="calc()"></div>
            <div style="flex: 1;"><label>⏱️ Час (год)</label><input type="number" id="t" placeholder="0" oninput="calc()"></div>
        </div>

        <label>💰 Пластик (грн/кг)</label>
        <input type="number" id="p" value="800" oninput="calc()">

        <div class="switch-box">
            <span>📦 Пакування (40 ₴)</span>
            <input type="checkbox" id="pack_check" onchange="calc()" style="width:20px; height:20px;">
        </div>

        <div class="switch-box" style="border-color: var(--cyan);">
            <span style="color: var(--cyan);">🇺🇦 Донат на ЗСУ</span>
            <select id="zsu_amount" style="width: 85px; margin: 0; padding: 5px;" onchange="calc()">
                <option value="0">0 ₴</option>
                <option value="20">20 ₴</option>
                <option value="50">50 ₴</option>
                <option value="100">100 ₴</option>
            </select>
        </div>

        <label>⚠️ Брак: <b id="bLabel" style="color:var(--cyan)">5%</b></label>
        <input type="range" id="b" min="0" max="20" value="5" class="slider-range" oninput="calc()">

        <label>📈 Націнка: <b id="mLabel" style="color:var(--purp)">100%</b></label>
        <input type="range" id="m" min="0" max="500" value="100" class="slider-range" oninput="calc()">
        
        <button class="main-btn" onclick="copyCheck()">📋 СКОПІЮВАТИ ТА ЗБЕРЕГТИ</button>

        <div class="zsu-stats">
            🇺🇦 Всього зібрано на ЗСУ: <b id="total_zsu_display">0</b> ₴
            <br>
            <span style="font-size: 10px; color: #888; cursor: pointer; text-decoration: underline;" onclick="resetZSU()">Оновити збір</span>
        </div>

        <div id="history-container" style="margin-top: 20px;">
            <label>📜 Історія (5)</label>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="colors" class="card">
        <h3 style="margin-top:0">🎨 Налаштування кольорів</h3>
        <p style="font-size: 11px; color: #aaa; margin-bottom: 15px;">Обери колір та додай пряме посилання.</p>
        <div id="color-list-container"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const colorData = [
            { name: "Black Matte", hex: "#1a1a1a", url: "" },
            { name: "White Basic", hex: "#ffffff", url: "" },
            { name: "Silk Gold", hex: "#ffd700", url: "" },
            { name: "Cyan Basic", hex: "#00ffff", url: "" },
            { name: "Neon Green", hex: "#39ff14", url: "" }
        ];

        document.getElementById('mono_card').value = localStorage.getItem('dry_mono') || "";
        updateZSUDisplay();
        renderColors();
        renderHistory();

        function saveMono() { localStorage.setItem('dry_mono', document.getElementById('mono_card').value); }

        function updateZSUDisplay() {
            let total = localStorage.getItem('total_zsu_donated') || 0;
            document.getElementById('total_zsu_display').innerText = total;
        }

        function resetZSU() {
            if(confirm("Скинути статистику донатів?")) {
                localStorage.setItem('total_zsu_donated', 0);
                updateZSUDisplay();
            }
        }

        function renderColors() {
            let html = colorData.map((c, i) => `
                <div class="color-item">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;">
                        <div style="display:flex; align-items:center;">
                            <div class="color-dot" style="background:${c.hex}"></div>
                            <span>${c.name}</span>
                        </div>
                        <input type="checkbox" class="color-sel" data-index="${i}" style="width:18px; height:18px;">
                    </div>
                    <input type="text" class="col-link" id="link-${i}" placeholder="Пряме посилання на колір" value="${c.url}" style="font-size:12px; padding:8px;">
                </div>
            `).join('');
            document.getElementById('color-list-container').innerHTML = html;
        }

        function calc() {
            let pwr = document.getElementById('printer').value;
            let plastic = document.getElementById('p').value || 0;
            let w = document.getElementById('w').value || 0;
            let t = document.getElementById('t').value || 0;
            let markup = document.getElementById('m').value;
            let scrap = document.getElementById('b').value;
            let pack = document.getElementById('pack_check').checked ? 40 : 0;
            let zsu = parseInt(document.getElementById('zsu_amount').value);
            
            document.getElementById('mLabel').innerText = markup + "%";
            document.getElementById('bLabel').innerText = scrap + "%";
            
            let el = (pwr / 1000) * t * 4.32;
            let net = (w * (plastic / 1000)) + el + (t * 5); 
            let total = (net * (1 + scrap / 100) * (1 + markup / 100)) + pack + zsu;
            document.getElementById('res').innerText = Math.round(total) + " ₴";
        }

        function copyCheck() {
            let res = document.getElementById('res').innerText;
            let card = document.getElementById('mono_card').value;
            let zsu = parseInt(document.getElementById('zsu_amount').value);
            let name = document.getElementById('p1_name').value || "Виріб";
            let ship = document.getElementById('shipping').value;
            let time = document.getElementById('deadline').value;
            
            if(!document.getElementById('w').value) return tg.showAlert("Введи вагу!");

            let selCols = [];
            document.querySelectorAll('.color-sel:checked').forEach(el => {
                let idx = el.getAttribute('data-index');
                let link = document.getElementById('link-' + idx).value;
                selCols.push(`• ${colorData[idx].name}${link ? ': ' + link : ''}`);
            });
            let colText = selCols.length > 0 ? `\n🎨 Колір:\n${selCols.join('\n')}` : "";

            let currentTotal = parseInt(localStorage.getItem('total_zsu_donated') || 0);
            let newTotal = currentTotal + zsu;
            if (zsu > 0) {
                localStorage.setItem('total_zsu_donated', newTotal);
                updateZSUDisplay();
            }

            let msg = `🚀 Рахунок Dryguny:\n📦 Виріб: ${name}${colText}\n📅 Термін: ${time}\n🚚 Доставка: ${ship}\n\n💰 Сума до сплати: ${res}${zsu > 0 ? '\n🇺🇦 З них донат на ЗСУ: ' + zsu + ' ₴' : ''}${card ? '\n💳 Карта: ' + card : ''}\n\n📊 Разом зібрано на ЗСУ: ${newTotal} ₴\n\n🛠 Дякуємо за замовлення!`;
            
            navigator.clipboard.writeText(msg).then(() => {
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Чек скопійовано!");
                saveHistory(name, res);
            });
        }

        function saveHistory(name, price) {
            let h = JSON.parse(localStorage.getItem('dry_v30') || '[]');
            h.unshift({ name, price, date: new Date().toLocaleTimeString() });
            if(h.length > 5) h.pop();
            localStorage.setItem('dry_v30', JSON.stringify(h));
            renderHistory();
        }

        function renderHistory() {
            let h = JSON.parse(localStorage.getItem('dry_v30') || '[]');
            document.getElementById('history-list').innerHTML = h.map(x => `
                <div class="history-item">
                    <span>${x.name} <small>(${x.date})</small></span>
                    <b>${x.price}</b>
                </div>
            `).join('');
        }

        function openTab(id, btn) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
