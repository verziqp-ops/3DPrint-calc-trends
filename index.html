<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dryguny Pro v41.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #ff5722; --bg: #fdfaf5; --card-bg: #ffffff; 
            --text: #2c2c2c; --gray: #9e9e9e; --input: #f7f3f0;
            --border: rgba(0,0,0,0.06); --banner-bg: #000000;
        }
        body.dark { 
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #f0f0f0; 
            --gray: #777; --input: #262626; --border: rgba(255,255,255,0.05);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; transition: 0.4s; padding-bottom: 80px; }
        
        .shop-categories { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .cat-chip { background: var(--input); color: var(--gray); padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); }
        .cat-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--input); }
        .product-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .product-price { color: var(--accent); font-weight: 900; font-size: 16px; margin-bottom: 10px; }
        .buy-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; font-size: 12px; }

        #floating-cart { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 15px 20px; border-radius: 30px; font-weight: 900; box-shadow: 0 10px 20px rgba(255,87,34,0.3); z-index: 999; cursor: pointer; display: none; align-items: center; gap: 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 28px; width: 100%; max-width: 400px; position: relative; max-height: 90vh; overflow-y: auto; }

        .price-banner { background: var(--banner-bg); color: white; width: 100%; max-width: 440px; padding: 25px; border-radius: 28px; text-align: center; margin: 0 auto 25px; position: sticky; top: 10px; z-index: 100; }
        .price-tag { font-size: 52px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #222; }
        
        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; width: 100%; max-width: 440px; box-sizing: border-box; margin: 0 auto 20px; border: 1px solid var(--border); }
        .tabs { display: flex; overflow-x: auto; background: var(--input); border-radius: 16px; padding: 5px; margin: 0 auto 20px; gap: 4px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: none; color: var(--gray); font-weight: bold; cursor: pointer; font-size: 10px; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: white; }
        
        label { display: block; margin: 15px 0 6px 4px; font-size: 10px; color: var(--gray); font-weight: 700; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 16px; border: none; background: var(--input); color: var(--text); font-size: 16px; box-sizing: border-box; margin-bottom: 5px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .round-btn { background: #333; color: #fff; border: none; padding: 5px 12px; border-radius: 10px; font-size: 10px; cursor: pointer; }
        
        .item-row { background: var(--input); padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .order-box { background: var(--input); padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .btn-action { padding: 8px; border-radius: 10px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body class="dark">

    <div class="header-box" style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <div style="font-weight: 900; font-size: 20px;">DRYGUNY <span style="color:var(--accent)">3D</span></div>
        <button onclick="document.body.classList.toggle('dark')" style="background:none; border:none; font-size:20px; cursor:pointer;">🌓</button>
    </div>

    <div class="tabs" id="mode-nav" style="display:none">
        <button class="tab-btn active" onclick="showView('shop-view', this)">🛍 МАГАЗИН</button>
        <button class="tab-btn" id="admin-tab-btn" onclick="showView('admin-view', this)">🔑 АДМІН</button>
    </div>

    <div id="shop-view">
        <div class="shop-categories">
            <div class="cat-chip active" onclick="filterShop('Всі', this)">Всі</div>
            <div class="cat-chip" onclick="filterShop('Дім', this)">🏠 Дім</div>
            <div class="cat-chip" onclick="filterShop('Брелоки', this)">🔑 Брелоки</div>
            <div class="cat-chip" onclick="filterShop('Інше', this)">📦 Інше</div>
        </div>
        <div class="shop-grid" id="public-shop-list"></div>
    </div>

    <div id="floating-cart" onclick="openOrderModal()">
        <span>🛒</span> <span id="client-cart-count">0</span> <span>ОФОРМИТИ</span>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0; font-size:18px;">Ваш кошик</h2>
            <div id="client-cart-list" style="margin-bottom:15px;"></div>
            <label>Ваш номер телефону</label>
            <input type="tel" id="order-phone" placeholder="+380...">
            <label>ПІБ або назва ФОП</label>
            <input type="text" id="order-fop" placeholder="Максим Бойко">
            <button class="main-btn" onclick="checkout()">ЗАМОВИТИ</button>
            <button class="main-btn" style="background:#444; margin-top:10px;" onclick="document.getElementById('order-modal').style.display='none'">НАЗАД</button>
        </div>
    </div>

    <div id="admin-view" style="display:none">
        <div class="price-banner">
            <div id="res" class="price-tag">0 ₴</div>
            <button class="round-btn" onclick="roundPrice()">ОКРУГЛИТИ ДО 10</button>
            <div class="stats-grid">
                <div class="stat-item"><span>Собівартість</span><b id="total_cost">0</b> ₴</div>
                <div class="stat-item"><span>Прибуток</span><b id="profit_val">0</b> ₴</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('orders', this)">📝 ЗАМОВЛЕННЯ</button>
            <button class="tab-btn" onclick="openTab('calc', this)">ГОЛОВНА</button>
            <button class="tab-btn" onclick="openTab('catalog', this)">📖 КАТАЛОГ</button>
            <button class="tab-btn" onclick="openTab('storage', this)">📦 СКЛАД</button>
        </div>

        <div id="orders" class="card tab-content">
            <div id="orders-list">Завантаження замовлень...</div>
        </div>

        <div id="calc" class="card tab-content" style="display:none">
            <input type="text" id="p_name" placeholder="Назва моделі">
            <input type="text" id="p_desc" placeholder="Опис">
            <label>Фото товару</label>
            <input type="file" accept="image/*" onchange="previewImage(this)">
            <img id="img_preview" style="width:100%; border-radius:12px; margin-top:10px; display:none;">
            <div class="row">
                <div><label>Категорія</label><select id="p_cat"><option value="Дім">🏠 Дім</option><option value="Брелоки">🔑 Брелоки</option><option value="Інше">📦 Інше</option></select></div>
                <div><label>Ціна пластику</label><input type="number" id="p_price" value="850" oninput="saveSettings()"></div>
            </div>
            <div class="row">
                <div><label>Вага (г)</label><input type="number" id="w" value="0" oninput="calc()"></div>
                <div><label>Години</label><input type="number" id="t_h" value="0" oninput="calc()"></div>
            </div>
            <label>Націнка: <span id="m_val">100</span>%</label>
            <input type="range" id="m" min="0" max="500" value="100" oninput="document.getElementById('m_val').innerText=this.value; calc()">
            <button class="main-btn" onclick="saveToCatalog()">💾 ЗБЕРЕГТИ В МАГАЗИН</button>
        </div>

        <div id="catalog" class="card tab-content" style="display:none"><div id="catalog-list"></div></div>
        <div id="storage" class="card tab-content" style="display:none">
            <label>Амортизація (₴/год)</label><input type="number" id="val_amort" value="5" oninput="saveSettings()">
            <label>Електрика (₴/год)</label><input type="number" id="val_light" value="1" oninput="saveSettings()">
            <label>Робота (₴/фікс)</label><input type="number" id="val_work_hour" value="50" oninput="saveSettings()">
            <label>Адгезія (₴/запуск)</label><input type="number" id="val_adhesion" value="3" oninput="saveSettings()">
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const ADMIN_ID = 6259271140; 
        const DB_URL = "https://magazin-7f3f2-default-rtdb.europe-west1.firebasedatabase.app/";

        let catalog = [];
        let clientCart = JSON.parse(localStorage.getItem('dryguny_client_cart') || '[]'); 
        let currentImg = "";

        async function loadSharedCatalog() {
            const res = await fetch(`${DB_URL}/catalog.json`);
            const data = await res.json();
            catalog = data ? Object.values(data) : [];
            renderPublicShop();
        }

        // --- КЛІЄНТСЬКА ЧАСТИНА ---

        function updateClientCartUI() {
            localStorage.setItem('dryguny_client_cart', JSON.stringify(clientCart));
            document.getElementById('client-cart-count').innerText = clientCart.length;
            document.getElementById('floating-cart').style.display = clientCart.length > 0 ? 'flex' : 'none';
        }

        function addClientToCart(name, price) {
            clientCart.push({ id: Date.now(), name, price });
            updateClientCartUI();
        }

        function openOrderModal() {
            document.getElementById('order-modal').style.display = 'flex';
            const list = document.getElementById('client-cart-list');
            list.innerHTML = clientCart.map((item, index) => `
                <div class="item-row">
                    <span>${item.name} (${item.price} ₴)</span>
                    <button onclick="removeFromClientCart(${index})" style="background:none; border:none; color:red; font-weight:bold;">✕</button>
                </div>
            `).join('');
        }

        function removeFromClientCart(index) {
            clientCart.splice(index, 1);
            updateClientCartUI();
            openOrderModal();
        }

        async function checkout() {
            const phone = document.getElementById('order-phone').value;
            const fop = document.getElementById('order-fop').value;
            if(!phone || !fop || clientCart.length === 0) return alert("Заповніть дані!");

            const order = {
                id: Date.now(),
                phone, fop,
                items: clientCart.map(i => i.name).join(", "),
                total: clientCart.reduce((s, i) => s + i.price, 0)
            };

            // 1. В Firebase (для адмінки)
            await fetch(`${DB_URL}/orders/${order.id}.json`, { method: 'PUT', body: JSON.stringify(order) });
            
            // 2. В Telegram боту (якщо кнопка Reply)
            tg.sendData(JSON.stringify(order));

            alert("Замовлення надіслано!");
            clientCart = [];
            updateClientCartUI();
            document.getElementById('order-modal').style.display = 'none';
        }

        // --- АДМІН ЧАСТИНА ---

        async function loadOrders() {
            const res = await fetch(`${DB_URL}/orders.json`);
            const data = await res.json();
            const list = document.getElementById('orders-list');
            if(!data) return list.innerHTML = "Замовлень поки немає";
            
            list.innerHTML = Object.values(data).map(o => `
                <div class="order-box">
                    <b>👤 ${o.fop}</b><br>
                    📞 ${o.phone}<br>
                    📦 ${o.items}<br>
                    💰 <b>${o.total} ₴</b><br>
                    <button class="btn-action" style="background:#4caf50; color:white;" onclick="copyOrder('${o.fop}', '${o.phone}', '${o.items}', '${o.total}')">📋 КОПІЮВАТИ</button>
                    <button class="btn-action" style="background:#f44336; color:white; margin-left:10px;" onclick="deleteOrder('${o.id}')">✕ ВИДАЛИТИ</button>
                </div>
            `).join('');
        }

        function copyOrder(fop, phone, items, total) {
            const text = `Замовлення:\nКлієнт: ${fop}\nТел: ${phone}\nТовари: ${items}\nСума: ${total} ₴`;
            navigator.clipboard.writeText(text);
            alert("Дані скопійовано!");
        }

        async function deleteOrder(id) {
            if(confirm("Видалити це замовлення?")) {
                await fetch(`${DB_URL}/orders/${id}.json`, { method: 'DELETE' });
                loadOrders();
            }
        }

        async function saveToCatalog() {
            let name = document.getElementById('p_name').value;
            if(!name) return alert("Введи назву!");
            let d = calc();
            let newProduct = {
                id: Date.now(),
                name: name, category: document.getElementById('p_cat').value,
                calculated_price: d.final, img: currentImg
            };
            await fetch(`${DB_URL}/catalog/${newProduct.id}.json`, { method: 'PUT', body: JSON.stringify(newProduct) });
            alert("Товар додано!");
            loadSharedCatalog();
        }

        function calc() {
            let pPrice = parseFloat(document.getElementById('p_price').value) || 850;
            let w = parseFloat(document.getElementById('w').value) || 0;
            let h = parseFloat(document.getElementById('t_h').value) || 0;
            let m = parseFloat(document.getElementById('m').value);
            let amort = parseFloat(document.getElementById('val_amort').value) || 5;
            let light = parseFloat(document.getElementById('val_light').value) || 1;
            let work = parseFloat(document.getElementById('val_work_hour').value) || 50;

            let plasticCost = w * (pPrice / 1000);
            let techCost = h * (amort + light);
            let final = ((plasticCost + techCost) * (1 + m/100)) + work;

            document.getElementById('res').innerText = Math.round(final) + " ₴";
            document.getElementById('total_cost').innerText = Math.round(plasticCost + techCost + work);
            document.getElementById('profit_val').innerText = Math.round(final - (plasticCost + techCost + work));
            return { final: Math.round(final) };
        }

        function renderPublicShop(filter = 'Всі') {
            const list = document.getElementById('public-shop-list');
            const filtered = filter === 'Всі' ? catalog : catalog.filter(i => i.category === filter);
            list.innerHTML = filtered.map(item => `
                <div class="product-card">
                    ${item.img ? `<img src="${item.img}" class="product-img">` : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;">3D</div>`}
                    <div class="product-info">
                        <div class="product-title">${item.name}</div>
                        <div class="product-price">${item.calculated_price} ₴</div>
                        <button class="buy-btn" onclick="addClientToCart('${item.name}', ${item.calculated_price})">В КОШИК</button>
                    </div>
                </div>`).join('');
        }

        function filterShop(cat, btn) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderPublicShop(cat);
        }

        function showView(id, btn) {
            document.getElementById('shop-view').style.display = (id === 'shop-view') ? 'block' : 'none';
            document.getElementById('admin-view').style.display = (id === 'admin-view') ? 'block' : 'none';
            document.querySelectorAll('#mode-nav .tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'admin-view') loadOrders();
        }

        function openTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('#admin-view .tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'orders') loadOrders();
            if(id === 'catalog') renderCatalogList();
        }

        function renderCatalogList() {
            document.getElementById('catalog-list').innerHTML = catalog.map(i => `
                <div class="item-row">
                    <span>${i.name} (${i.calculated_price} ₴)</span>
                    <button onclick="deleteProduct('${i.id}')" style="background:none; border:none; color:red;">✕</button>
                </div>`).join('');
        }

        async function deleteProduct(id) {
            await fetch(`${DB_URL}/catalog/${id}.json`, { method: 'DELETE' });
            loadSharedCatalog();
            renderCatalogList();
        }

        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = e => {
                currentImg = e.target.result;
                document.getElementById('img_preview').src = currentImg;
                document.getElementById('img_preview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveSettings() {
            const s = {
                p_price: document.getElementById('p_price').value,
                val_amort: document.getElementById('val_amort').value,
                val_light: document.getElementById('val_light').value,
                val_work_hour: document.getElementById('val_work_hour').value
            };
            localStorage.setItem('dryguny_settings', JSON.stringify(s));
            calc();
        }

        window.onload = () => {
            if (tg.initDataUnsafe?.user?.id === ADMIN_ID) document.getElementById('mode-nav').style.display = 'flex';
            const s = JSON.parse(localStorage.getItem('dryguny_settings') || '{}');
            for(let key in s) if(document.getElementById(key)) document.getElementById(key).value = s[key];
            loadSharedCatalog();
            updateClientCartUI();
        };
    </script>
</body>
</html>
